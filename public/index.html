<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حروف مع حسن</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-light:#dcfce7;--green-dark:#14532d;
  --orange:#ea580c;--orange-light:#ffedd5;--orange-dark:#7c2d12;
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--muted2:#94a3b8;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;}

/* ══ STAGE SYSTEM ══ */
.stage{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;}
.stage.active{display:flex;}
.fade-out{animation:fadeOut .45s ease forwards;}
.fade-in{animation:fadeIn .5s ease forwards;}
@keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══ STAGE 1: ESCAPE BUTTON ══ */
#s-escape{background:var(--bg);}
.escape-bg-circles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.escape-bg-circles span{position:absolute;border-radius:50%;border:1.5px solid var(--border);animation:circleExpand 6s ease-in-out infinite;}
.escape-bg-circles span:nth-child(1){width:300px;height:300px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:0s;}
.escape-bg-circles span:nth-child(2){width:500px;height:500px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:.8s;}
.escape-bg-circles span:nth-child(3){width:700px;height:700px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:1.6s;}
@keyframes circleExpand{0%,100%{opacity:.25}50%{opacity:.08}}

.game-logo{
  font-size:2rem;font-weight:900;text-align:center;margin-bottom:48px;
  background:linear-gradient(135deg,var(--green),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.game-logo-sub{font-size:.82rem;font-weight:400;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:2px;}

/* The escape button */
#escape-btn{
  position:absolute;
  width:120px;height:120px;border-radius:50%;border:none;
  background:linear-gradient(145deg,var(--green),#22c55e);
  color:#fff;font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 0 var(--green-dark),0 12px 28px rgba(22,163,74,.35),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .1s,box-shadow .1s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transform:translate(-50%,-50%);
  left:50%;top:50%;
}
#escape-btn:active{box-shadow:0 3px 0 var(--green-dark),0 4px 12px rgba(22,163,74,.25),inset 0 1px 0 rgba(255,255,255,.25);transform:translate(-50%,-50%) translateY(5px);}
.escape-hint{position:absolute;bottom:48px;color:var(--muted2);font-size:.82rem;}

/* ══ STAGE 2: INVITE CODE ══ */
#s-invite{background:var(--bg);}
.invite-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:20px;
  padding:44px 40px;width:360px;max-width:95vw;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  box-shadow:0 4px 24px rgba(0,0,0,.07);
}
.invite-logo{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.invite-sub{color:var(--muted);font-size:.82rem;margin-top:-10px;}
.invite-input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  padding:14px 18px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;
  text-align:center;letter-spacing:5px;outline:none;transition:border-color .2s;
}
.invite-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1);}
.invite-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;
  font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;
  box-shadow:0 4px 18px rgba(22,163,74,.3);transition:all .2s;
}
.invite-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(22,163,74,.4);}
.invite-err{font-size:.85rem;color:#dc2626;min-height:18px;text-align:center;}
.back-link{font-size:.8rem;color:var(--muted2);cursor:pointer;border-bottom:1px dashed var(--muted2);}
.back-link:hover{color:var(--muted);}

/* ══ STAGE 3: TTY ══ */
#s-tty{background:var(--bg);}
.laptop-wrap{animation:laptopOpen .8s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes laptopOpen{from{transform:rotateX(-40deg) translateY(50px);opacity:0}to{transform:rotateX(0) translateY(0);opacity:1}}
.laptop-screen{
  width:min(680px,96vw);height:min(420px,70vh);
  background:#0a0e14;border:2px solid #1e2938;border-radius:14px 14px 3px 3px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 0 1px #111,0 50px 100px rgba(0,0,0,.3);
}
.titlebar{background:#111820;border-bottom:1px solid #1e2938;padding:8px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tdot{width:10px;height:10px;border-radius:50%;}
.tty-body{flex:1;padding:18px 22px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#00ff41;scrollbar-width:none;}
.tty-body::-webkit-scrollbar{display:none;}
.tty-line{line-height:1.75;white-space:pre-wrap;}
.c-dim{color:#2d5a3d}.c-white{color:#c8d4df}.c-yellow{color:#facc15}
.inp-row{display:flex;align-items:center;gap:8px;margin-top:2px;}
.tty-prompt{color:#00ff41;white-space:nowrap;font-size:13px;font-family:'IBM Plex Mono',monospace;}
.tty-field{background:transparent;border:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;flex:1;caret-color:#00ff41;}
.team-btns{display:flex;gap:12px;margin-top:8px;}
.tbtn{padding:8px 20px;border-radius:8px;border:1px solid;font-family:'Tajawal',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;background:transparent;transition:all .2s;}
.tbtn.g{border-color:var(--green);color:var(--green)}.tbtn.g:hover,.tbtn.sg{background:rgba(22,163,74,.18);}
.tbtn.o{border-color:var(--orange);color:var(--orange)}.tbtn.o:hover,.tbtn.so{background:rgba(234,88,12,.18);}
.cur{display:inline-block;width:7px;height:13px;background:#00ff41;animation:blink 1s step-end infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.laptop-base{width:min(680px,96vw);height:16px;background:linear-gradient(180deg,#1a1a1a,#111);border-radius:0 0 8px 8px;border:2px solid #1e2938;border-top:none;}

/* ══ SURVEY (inside TTY) ══ */
.survey-wrap{margin-top:10px;}
.survey-q{color:#facc15;margin-bottom:6px;font-size:12px;}
.survey-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.survey-label{color:#bbb;font-size:12px;min-width:80px;}
.survey-stars{display:flex;gap:4px;}
.s-star{width:20px;height:20px;border-radius:4px;border:1px solid #2d5a3d;background:#0a0e14;color:#2d5a3d;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'IBM Plex Mono',monospace;}
.s-star.on{background:#d97706;border-color:#d97706;color:#fff;}
.s-star:hover{border-color:#facc15;color:#facc15;}
.survey-done-btn{margin-top:10px;padding:7px 20px;border-radius:7px;border:1px solid #22c55e;background:rgba(22,197,94,.15);color:#22c55e;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;}
.survey-done-btn:hover{background:rgba(22,197,94,.25);}

/* ══ AUTH SCREEN ══ */
#s-auth{background:var(--bg);z-index:200;}
.auth-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:36px;width:380px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-logo{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-align:center;}
.auth-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:22px;}
.auth-tabs{display:flex;gap:0;margin-bottom:22px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;text-align:center;font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;background:var(--bg);color:var(--muted);border:none;transition:all .2s;}
.auth-tab.on{background:var(--surface);color:var(--text);}
.auth-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.95rem;outline:none;margin-bottom:10px;transition:border-color .2s;}
.auth-inp:focus{border-color:var(--green);}
.auth-domain{font-size:.82rem;font-weight:700;color:var(--muted);white-space:nowrap;margin-bottom:10px;}
.auth-btn{width:100%;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;font-family:'Tajawal',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(22,163,74,.3);transition:all .15s;margin-top:4px;}
.auth-btn:hover{transform:translateY(-1px);}
.auth-err{font-size:.82rem;color:#dc2626;min-height:18px;text-align:center;margin-top:4px;}
.auth-skip{font-size:.75rem;color:var(--muted2);text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline;}

/* ══ TUTORIAL ══ */
#tutorial-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(5,8,18,.88);backdrop-filter:blur(6px);align-items:center;justify-content:center;cursor:pointer;}
#tutorial-overlay.active{display:flex;}
.tut-card{background:#fff;border-radius:22px;padding:36px 40px;max-width:400px;width:92vw;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:tutIn .4s cubic-bezier(.34,1.4,.64,1);pointer-events:none;position:relative;}
@keyframes tutIn{from{opacity:0;transform:scale(.82) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tut-exit{animation:tutOut .3s ease forwards;}
@keyframes tutOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.88) translateY(-20px)}}
.tut-icon{font-size:3.8rem;margin-bottom:12px;line-height:1;display:block;}
.tut-step{font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.tut-title{font-size:1.35rem;font-weight:900;color:#1e293b;margin-bottom:10px;line-height:1.3;}
.tut-body{font-size:.92rem;color:#475569;line-height:1.65;margin-bottom:18px;}
.tut-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:all .3s;}
.tut-dot.on{background:#16a34a;width:20px;}
.tut-hint{font-size:.75rem;color:#94a3b8;animation:blink2 2s ease infinite;}
@keyframes blink2{0%,100%{opacity:.5}50%{opacity:1}}
.tut-skip{position:absolute;top:14px;left:16px;font-size:.72rem;color:#94a3b8;pointer-events:all;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;}

/* زر عشوائي */
.tbtn.r{border-color:#7c3aed;color:#7c3aed}.tbtn.r:hover,.tbtn.sr{background:rgba(124,58,237,.18);}

</style>
</head>
<body>

<!-- STAGE 0: AUTH -->
<div class="stage active" id="s-auth">
  <div class="auth-card">
    <div class="auth-logo">حروف مع حسن</div>
    <div class="auth-sub">سجّل حساب أو ادخل باليوزرنيم</div>
    <div class="auth-tabs">
      <button class="auth-tab" id="tab-login" onclick="switchAuthTab('login')">دخول</button>
      <button class="auth-tab on" id="tab-register" onclick="switchAuthTab('register')">تسجيل جديد</button>
    </div>
    <div id="form-register">
      <input class="auth-inp" id="reg-username" placeholder="اليوزرنيم (يظهر للاعبين)" maxlength="20">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">
        <input class="auth-inp" id="reg-email-local" placeholder="الإيميل" style="margin:0;flex:1">
        <span class="auth-domain">@7snn.onion</span>
      </div>
      <input class="auth-inp" id="reg-password" type="password" placeholder="الباسورد (4 أحرف+)">
      <input class="auth-inp" id="reg-title" placeholder="لقبك (مثلاً: الأسطورة...)" maxlength="20">
      <button class="auth-btn" onclick="doRegister()">✅ إنشاء حساب</button>
      <div class="auth-err" id="reg-err"></div>
    </div>
    <div id="form-login" style="display:none">
      <input class="auth-inp" id="login-username" placeholder="اليوزرنيم" onkeydown="if(event.key==='Enter')doLoginAuth()">
      <button class="auth-btn" onclick="doLoginAuth()">🚀 دخول</button>
      <div class="auth-err" id="login-err-auth"></div>
    </div>
    <div class="auth-skip" onclick="skipAuth()">تخطي — العب كضيف</div>
  </div>
</div>

<!-- STAGE 1: ESCAPE BUTTON -->
<div class="stage" id="s-escape">
  <div class="escape-bg-circles"><span></span><span></span><span></span></div>
  <div class="game-logo">
    حروف مع حسن
    <div class="game-logo-sub">اصطد الزر لتدخل اللعبة 👇</div>
  </div>
  <button id="escape-btn" onclick="catchBtn()">دخول</button>
  <div class="escape-hint">الزر يهرب منك... اصطده!</div>
</div>

<!-- STAGE 2: TTY -->
<div class="stage" id="s-tty">
  <div class="laptop-wrap">
    <div class="laptop-screen">
      <div class="titlebar">
        <div class="tdot" style="background:#ff5f57"></div>
        <div class="tdot" style="background:#febc2e"></div>
        <div class="tdot" style="background:#28c840"></div>
        <span style="color:#3d5264;font-size:11px;font-family:'IBM Plex Mono',monospace;margin-right:auto">hassan@7oroof ~ bash</span>
      </div>
      <div class="tty-body" id="tty-body"></div>
    </div>
    <div class="laptop-base"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ reconnection:true });
let playerName='', playerTeam='', joined=false;
let dbUsername = localStorage.getItem('hasan_username')||'';

// AUTH
function switchAuthTab(tab){
  document.getElementById('form-register').style.display = tab==='register'?'block':'none';
  document.getElementById('form-login').style.display    = tab==='login'?'block':'none';
  document.getElementById('tab-register').classList.toggle('on', tab==='register');
  document.getElementById('tab-login').classList.toggle('on', tab==='login');
}
window.addEventListener('DOMContentLoaded',()=>{
  const saved = localStorage.getItem('hasan_username');
  if(saved){ switchAuthTab('login'); const el=document.getElementById('login-username'); if(el) el.value=saved; }
  else switchAuthTab('register');
});

async function doRegister(){
  const username = document.getElementById('reg-username').value.trim();
  const emailLocal= document.getElementById('reg-email-local').value.trim();
  const password  = document.getElementById('reg-password').value;
  const title     = document.getElementById('reg-title').value.trim();
  const errEl     = document.getElementById('reg-err');
  errEl.textContent='';
  if(!username||!emailLocal||!password){ errEl.textContent='اكمل البيانات'; return; }
  const email = emailLocal+'@7snn.onion';
  const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password,title})});
  const data = await res.json();
  if(!data.ok){ errEl.textContent=data.msg; return; }
  localStorage.setItem('hasan_username', username);
  dbUsername = username;
  goToEscape();
}

async function doLoginAuth(){
  const username = document.getElementById('login-username').value.trim();
  const errEl    = document.getElementById('login-err-auth');
  errEl.textContent='';
  if(!username){ errEl.textContent='ادخل اليوزرنيم'; return; }
  const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  const data = await res.json();
  if(!data.ok){ errEl.textContent=data.msg; return; }
  localStorage.setItem('hasan_username', username);
  dbUsername = username;
  const p = data.profile;
  const card = document.querySelector('#s-auth .auth-card');
  card.innerHTML = '<div class="auth-logo">اهلا ' + p.username + '!</div>'
    + '<div style="text-align:center;margin:16px 0">'
    + '<div style="font-size:2.5rem">' + (p.badge||'🎮') + '</div>'
    + '<div style="font-weight:900;font-size:1.1rem;margin:6px 0">' + (p.title||'لاعب') + '</div>'
    + '<div style="color:var(--muted);font-size:.82rem">ليفل ' + p.level + (p.prestige>0?' • بريستيج '+p.prestige:'') + '</div>'
    + '<div style="display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:.82rem;color:var(--muted)">'
    + '<span>✓ ' + p.correct_answers + ' اجابة</span>'
    + '<span>🎮 ' + p.total_matches + ' مباراة</span>'
    + '</div></div>'
    + '<button class="auth-btn" onclick="goToEscape()">▶️ الدخول للعبة</button>';
}

function skipAuth(){ dbUsername=''; goToEscape(); }

function goToEscape(){
  const s0 = document.getElementById('s-auth');
  s0.classList.add('fade-out');
  setTimeout(()=>{
    s0.classList.remove('active','fade-out');
    document.getElementById('s-escape').classList.add('active');
    setTimeout(startIndexTutorial,800);
  },450);
}

// ESCAPE BUTTON
const btn = document.getElementById('escape-btn');
let btnCaught=false, escapeEnabled=false, moveCount=0;
const MAX_MOVES=12;
setTimeout(()=>{ escapeEnabled=true; },900);
btn.addEventListener('mouseenter', moveAway);
btn.addEventListener('touchstart',(e)=>{ e.preventDefault(); moveAway(); },{passive:false});

function moveAway(){
  if(!escapeEnabled||btnCaught||moveCount>=MAX_MOVES) return;
  moveCount++;
  const vw=window.innerWidth,vh=window.innerHeight,m=80;
  const x=m+Math.random()*(vw-120-m*2), y=m+Math.random()*(vh-120-m*2);
  btn.style.left=x+'px'; btn.style.top=y+'px';
  btn.style.transition='left .3s cubic-bezier(.34,1.56,.64,1),top .3s cubic-bezier(.34,1.56,.64,1)';
}

function catchBtn(){
  btnCaught=true; btn.textContent='تم!';
  btn.style.background='linear-gradient(145deg,#f97316,#ea580c)';
  btn.style.transition='all .3s';
  setTimeout(goToTTY,500);
}

// TTY
function goToTTY(){
  const s1=document.getElementById('s-escape');
  s1.classList.add('fade-out');
  setTimeout(()=>{
    s1.classList.remove('active','fade-out');
    document.getElementById('s-tty').classList.add('active');
    startTTY();
  },450);
}

const bootLines=[
  {t:'حروف مع حسن — نظام تسجيل اللاعبين',cls:'c-white',d:0},
  {t:'',d:80},
  {t:'[0.1] تهيئة الجلسة...',cls:'c-dim',d:280},
  {t:'[0.2] الاتصال بالسيرفر... ✓',cls:'c-dim',d:540},
  {t:'[0.3] تحميل شبكة الحروف... ✓',cls:'c-dim',d:800},
  {t:'[0.4] جاهز.',cls:'c-dim',d:1020},
  {t:'',d:1100},
  {t:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',cls:'c-dim',d:1150},
  {t:'  سجل بياناتك للانضمام',cls:'c-yellow',d:1250},
  {t:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━',cls:'c-dim',d:1350},
  {t:'',d:1430},
];

function addLine(text,cls){
  cls=cls||'';
  const body=document.getElementById('tty-body');
  const div=document.createElement('div');
  div.className='tty-line'+(cls?' '+cls:'');
  div.innerHTML=text||'\u00a0';
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
  return div;
}

function startTTY(){
  bootLines.forEach(function(l){ setTimeout(function(){ addLine(l.t,l.cls); },l.d); });
  setTimeout(showNamePrompt,1580);
}

function showNamePrompt(){
  if(dbUsername){ playerName=dbUsername; setTimeout(showTeamPrompt,300); return; }
  addLine('ما هو اسمك في اللعبة؟');
  const body=document.getElementById('tty-body');
  const row=document.createElement('div'); row.className='inp-row';
  row.innerHTML='<span class="tty-prompt">player@7oroof:~$</span><input class="tty-field" id="name-inp" maxlength="20" autocomplete="off"><span class="cur"></span>';
  body.appendChild(row); body.scrollTop=body.scrollHeight;
  const inp=document.getElementById('name-inp'); inp.focus();
  inp.addEventListener('keydown',function(e){
    if(e.key!=='Enter') return;
    const v=inp.value.trim(); if(!v) return;
    playerName=v;
    row.innerHTML='<span class="tty-prompt">player@7oroof:~$</span> <span style="color:#fff">'+v+'</span>';
    setTimeout(showTeamPrompt,300);
  });
}

function showTeamPrompt(){
  const body=document.getElementById('tty-body');
  addLine(''); addLine('اختر فريقك:'); addLine('');
  const wrap=document.createElement('div'); wrap.className='team-btns';
  wrap.innerHTML='<button class="tbtn g" onclick="pickTeam(\'green\',this)">🟢 الاخضر ('+getCount('green')+'/2)</button>'
    +'<button class="tbtn o" onclick="pickTeam(\'orange\',this)">🟠 البرتقالي ('+getCount('orange')+'/2)</button>'
    +'<button class="tbtn r" onclick="pickTeam(\'random\',this)">🎲 عشوائي</button>';
  body.appendChild(wrap); body.scrollTop=body.scrollHeight;
}

function getCount(t){ return Object.values((window._latestState||{players:{}}).players).filter(function(p){ return p.team===t; }).length; }
socket.on('gameState',function(state){ window._latestState=state; });

function pickTeam(team,btnEl){
  playerTeam=team;
  document.querySelectorAll('.tbtn').forEach(function(b){ b.disabled=true; });
  if(team==='green') btnEl.classList.add('sg');
  else if(team==='orange') btnEl.classList.add('so');
  else btnEl.classList.add('sr');
  addLine(''); addLine('> اخترت: '+(team==='green'?'الاخضر 🟢':team==='orange'?'البرتقالي 🟠':'عشوائي 🎲'));
  setTimeout(function(){
    addLine('> جاري الانضمام...');
    socket.emit('playerJoin',{name:playerName,team:team,inviteCode:'__auto__',dbUsername:dbUsername||null});
  },600);
}

socket.on('joinOk',function(){
  addLine(''); addLine('> ✅ تم الانضمام بنجاح!','c-yellow');
  showSurvey();
});
socket.on('joinFail',function(msg){
  addLine(''); addLine('> ❌ '+msg);
  setTimeout(function(){ document.querySelectorAll('.tbtn').forEach(function(b){ b.disabled=false; b.classList.remove('sg','so','sr'); }); },800);
});
socket.on('teamsAssigned',function(assignments){
  const myData=assignments[socket.id]; if(!myData) return;
  playerTeam=myData.team; sessionStorage.setItem('playerTeam',playerTeam);
  showSpinnerOverlay(assignments,myData.team);
});

// SURVEY
const SURVEY_QUESTIONS=[
  {key:'s_كروي',    type:'stars',emoji:'⚽',q:'كيف معرفتك في كرة القدم؟'},
  {key:'s_ديني',    type:'stars',emoji:'🕌',q:'كيف معرفتك في الأسئلة الدينية؟'},
  {key:'s_علوم',    type:'stars',emoji:'🔬',q:'كيف معرفتك في العلوم الطبيعية؟'},
  {key:'s_جغرافيا', type:'stars',emoji:'🌍',q:'كيف معرفتك في الجغرافيا؟'},
  {key:'s_علمي',    type:'stars',emoji:'💡',q:'كيف معرفتك في العلوم والتقنية؟'},
  {key:'s_ثقافي',   type:'stars',emoji:'🎭',q:'كيف معرفتك في الثقافة العامة؟'},
  {key:'win_expect', type:'choice_or_text',emoji:'🏆',q:'هل تتوقع تفوز؟',choices:['نعم','لا']},
  {key:'site_opinion',type:'text',emoji:'🤔',q:'ايش رايك في اللي سوى الموقع؟',placeholder:'اكتب رأيك بصراحة...'},
  {key:'wars_opinion',type:'text',emoji:'💣',q:'ايش رايك في الحروب اللي قاعدة تصير؟',placeholder:'رأيك...'},
  {key:'epstein',    type:'text',emoji:'🕵️',q:'تتوقع ايبستين عايش؟ وايش رأيك فيه؟',placeholder:'نظريتك...'},
  {key:'obama',      type:'text',emoji:'🦎',q:'تتوقع اوباما سحلية؟',placeholder:'الحقيقة...'},
  {key:'survey_opinion',type:'text',emoji:'📝',q:'وش رأيك في الاستبيان؟',placeholder:'صراحة تامة...'},
  {key:'end_now',    type:'yesno',emoji:'🚪',q:'هل تبغى الاستبيان يخلص الحين؟',choices:['نعم، خلص!','لا، أكمل']},
];
const surveyAnswers={};
let surveyIdx=0;

function showSurvey(){
  if(localStorage.getItem('survey_done')==='1'){ submitSurvey(); return; }
  surveyIdx=0;
  addLine(''); addLine('─── استبيان ───────────────────────────','c-yellow');
  addLine('اضغط التالي بعد كل سؤال','c-white'); addLine('');
  showSurveyQ();
}

function showSurveyQ(){
  const body=document.getElementById('tty-body');
  const q=SURVEY_QUESTIONS[surveyIdx];
  if(!q){ finishSurvey(); return; }
  const qEl=document.createElement('div');
  qEl.className='tty-line c-white'; qEl.style.marginBottom='8px';
  qEl.innerHTML='<span style="color:#facc15">'+q.emoji+'</span> '+q.q;
  body.appendChild(qEl);
  var chosen=q.type==='stars'?3:null, inputEl=null;

  function getAnswer(){
    if(q.type==='stars') return {val:chosen,label:['ضعيف','متوسط','جيد','قوي','خبير'][chosen-1]};
    if(q.type==='text'||q.type==='choice_or_text'){
      var v=inputEl&&inputEl.tagName==='INPUT'?inputEl.value.trim():(Array.isArray(inputEl)?inputEl[1].value.trim():'');
      return {val:v||chosen||'—',label:v||chosen||'—'};
    }
    return {val:chosen||q.choices[1],label:chosen||q.choices[1]};
  }

  if(q.type==='stars'){
    var wrap=document.createElement('div'); wrap.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
    var emojis=['😐','🙂','😊','😎','🔥'];
    for(var i=1;i<=5;i++){
      (function(num){
        var s=document.createElement('button');
        s.className='s-star'+(num<=chosen?' on':'');
        s.textContent=emojis[num-1]; s.style.cssText='width:36px;height:36px;font-size:16px;border-radius:6px;';
        s.onclick=function(){ chosen=num; wrap.querySelectorAll('.s-star').forEach(function(b,j){ b.classList.toggle('on',j<num); }); };
        wrap.appendChild(s);
      })(i);
    }
    body.appendChild(wrap); inputEl=wrap;

  }else if(q.type==='text'){
    var inp=document.createElement('input');
    inp.style.cssText='width:100%;background:#111820;border:1px solid #2d5a3d;border-radius:6px;padding:7px 10px;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:12px;margin-bottom:10px;outline:none;';
    inp.placeholder=q.placeholder||''; inp.maxLength=200;
    body.appendChild(inp); inputEl=inp;
    setTimeout(function(){ inp.focus(); },50);

  }else if(q.type==='choice_or_text'){
    var cWrap=document.createElement('div'); cWrap.style.cssText='display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;';
    q.choices.forEach(function(c){
      var b=document.createElement('button'); b.className='survey-done-btn';
      b.style.cssText='padding:5px 14px;font-size:.82rem;opacity:.6;'; b.textContent=c;
      b.onclick=function(){ chosen=c; cWrap.querySelectorAll('button').forEach(function(x){ x.style.opacity='.5'; }); b.style.opacity='1'; b.style.borderColor='#facc15'; b.style.color='#facc15'; };
      cWrap.appendChild(b);
    });
    var cInp=document.createElement('input');
    cInp.style.cssText='width:100%;background:#111820;border:1px solid #2d5a3d;border-radius:6px;padding:7px 10px;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:12px;margin-bottom:10px;outline:none;';
    cInp.placeholder='او اكتب بكلامك...'; cInp.maxLength=200;
    body.appendChild(cWrap); body.appendChild(cInp);
    inputEl=[cWrap,cInp];

  }else if(q.type==='yesno'){
    var yWrap=document.createElement('div'); yWrap.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
    q.choices.forEach(function(c){
      var b=document.createElement('button'); b.className='survey-done-btn';
      b.style.cssText='padding:5px 18px;font-size:.85rem;opacity:.6;'; b.textContent=c;
      b.onclick=function(){
        chosen=c; yWrap.querySelectorAll('button').forEach(function(x){ x.style.opacity='.5'; });
        b.style.opacity='1'; b.style.borderColor='#facc15'; b.style.color='#facc15';
        if(c===q.choices[0]){ surveyAnswers[q.key]=c; finishSurvey(); }
      };
      yWrap.appendChild(b);
    });
    body.appendChild(yWrap); inputEl=yWrap;
  }

  var nextBtn=document.createElement('button');
  nextBtn.className='survey-done-btn'; nextBtn.style.marginTop='2px';
  nextBtn.textContent=surveyIdx===SURVEY_QUESTIONS.length-1?'✅ انهاء':'التالي →';
  nextBtn.onclick=function(){
    var ans=getAnswer(); surveyAnswers[q.key]=ans.val;
    qEl.remove();
    if(Array.isArray(inputEl)) inputEl.forEach(function(x){ x.remove(); }); else if(inputEl) inputEl.remove();
    nextBtn.remove();
    addLine('> '+q.emoji+' '+String(ans.label).slice(0,40),'c-dim');
    surveyIdx++; showSurveyQ();
  };
  body.appendChild(nextBtn);
  body.scrollTop=body.scrollHeight;
}

function finishSurvey(){ localStorage.setItem('survey_done','1'); submitSurvey(); }

function submitSurvey(){
  var scores={};
  ['كروي','ديني','علوم','جغرافيا','علمي','ثقافي'].forEach(function(k){ scores[k]=surveyAnswers['s_'+k]||3; });
  socket.emit('submitSurvey',scores);
  addLine(''); addLine('> ✅ تم!','c-yellow');
  addLine('> ⏳ في انتظار الهوست يبدأ اللعبة...','c-dim');
  joined=true;
  sessionStorage.setItem('playerName',playerName);
  sessionStorage.setItem('playerTeam',playerTeam);
  sessionStorage.setItem('inviteCode','__auto__');
}

// SPINNER
function showSpinnerOverlay(assignments,myTeam){
  var ov=document.getElementById('spin-overlay'); if(!ov) return;
  ov.style.display='flex';
  var spinEl=document.getElementById('spin-wheel');
  var names=Object.values(assignments).map(function(p){ return p.name; });
  var i=0,ticks=0;
  var ticker=setInterval(function(){
    spinEl.textContent=names[i%names.length]; i++; ticks++;
    if(ticks>30){ clearInterval(ticker); showTeamResults(assignments,myTeam); }
  },80);
}
function showTeamResults(assignments,myTeam){
  var spinEl=document.getElementById('spin-wheel');
  var resultEl=document.getElementById('spin-result');
  var state=window._latestState||{};
  var greens=Object.values(assignments).filter(function(p){ return p.team==='green'; }).map(function(p){ return p.name; });
  var oranges=Object.values(assignments).filter(function(p){ return p.team==='orange'; }).map(function(p){ return p.name; });
  var gName=(state.teamNames||{}).green||'الاخضر';
  var oName=(state.teamNames||{}).orange||'البرتقالي';
  spinEl.textContent=myTeam==='green'?'🟢':'🟠'; spinEl.style.fontSize='4rem';
  resultEl.innerHTML='<div style="font-size:1.1rem;font-weight:900;margin-bottom:14px">انت مع: <span style="color:'+(myTeam==='green'?'#16a34a':'#ea580c')+'">'+(myTeam==='green'?gName:oName)+'</span></div>'
    +'<div style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap;">'
    +'<div style="background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:10px 18px;min-width:110px;"><div style="font-size:.7rem;font-weight:700;color:#14532d;margin-bottom:6px">'+gName+'</div>'+greens.map(function(n){ return '<div style="font-weight:700;font-size:.9rem">'+n+'</div>'; }).join('')+'</div>'
    +'<div style="background:#ffedd5;border:2px solid #fdba74;border-radius:10px;padding:10px 18px;min-width:110px;"><div style="font-size:.7rem;font-weight:700;color:#7c2d12;margin-bottom:6px">'+oName+'</div>'+oranges.map(function(n){ return '<div style="font-weight:700;font-size:.9rem">'+n+'</div>'; }).join('')+'</div>'
    +'</div><div style="margin-top:16px;font-size:.8rem;color:#64748b">⏳ في انتظار بدء اللعبة...</div>';
  resultEl.style.display='block';
  setTimeout(function(){ document.getElementById('spin-overlay').style.display='none'; },5000);
}

socket.on('gameState',function(state){ if(state.phase==='playing'&&joined) window.location.href='/game.html'; });

// TUTORIAL
var INDEX_STEPS=[
  {icon:'🎮',title:'اهلا في حروف مع حسن!',body:'لعبة مسابقات بين فريقين. كل سؤال يمنح فريقك خلية — من يكمل الطريق اولاً يفوز!'},
  {icon:'🟢🟠',title:'فريقان يتنافسان',body:'الاخضر من اليمين لليسار ↔ — البرتقالي من فوق لتحت ↕'},
  {icon:'⚡',title:'الزر — سلاحك الوحيد',body:'لما يطلع السؤال اسرع واضغط الزر. اللي يضغط اول يجاوب.'},
  {icon:'🏷️',title:'التصنيف والصعوبة',body:'قبل السؤال تشوف التصنيف والصعوبة. استعد!'},
  {icon:'💡',title:'التلميح والالغاء',body:'بعد 30 ثانية زر تلميح، بعد دقيقتين زر الغاء — بشرط موافقة الكل.'},
  {icon:'🏆',title:'كيف تفوز؟',body:'خلايا متصلة من طرف للطرف الثاني. كل اجابة صح = خلية!'},
];
function startIndexTutorial(){
  if(localStorage.getItem('tut_index_done')==='1') return;
  showTutorial(INDEX_STEPS,'tut_index_done');
}
var _tutSteps=[],_tutIdx=0,_tutKey='';
function showTutorial(steps,key){
  _tutSteps=steps;_tutIdx=0;_tutKey=key;
  document.getElementById('tutorial-overlay').classList.add('active');
  renderTutStep();
  document.getElementById('tutorial-overlay').onclick=nextTutStep;
}
function renderTutStep(){
  var s=_tutSteps[_tutIdx],total=_tutSteps.length;
  document.getElementById('tut-card').innerHTML=
    '<span class="tut-skip" onclick="closeTutorial(event)">تخطي ✕</span>'
    +'<span class="tut-icon">'+s.icon+'</span>'
    +'<div class="tut-step">'+(_tutIdx+1)+' / '+total+'</div>'
    +'<div class="tut-title">'+s.title+'</div>'
    +'<div class="tut-body">'+s.body+'</div>'
    +'<div class="tut-dots">'+_tutSteps.map(function(_,i){ return '<div class="tut-dot'+(i===_tutIdx?' on':'')+'"></div>'; }).join('')+'</div>'
    +'<div class="tut-hint">'+(_tutIdx===total-1?'اضغط للبدء ✅':'اضغط للخطوة التالية →')+'</div>';
  var c=document.getElementById('tut-card'); c.classList.remove('tut-exit'); void c.offsetWidth;
}
function nextTutStep(e){
  if(e.target.classList.contains('tut-skip')) return;
  if(_tutIdx>=_tutSteps.length-1){ closeTutorial(); return; }
  var c=document.getElementById('tut-card'); c.classList.add('tut-exit');
  setTimeout(function(){ _tutIdx++; renderTutStep(); },280);
}
function closeTutorial(e){ if(e) e.stopPropagation(); localStorage.setItem(_tutKey,'1'); document.getElementById('tutorial-overlay').classList.remove('active'); }
setTimeout(startIndexTutorial,1000);
</script>

  <div style="font-size:.9rem;font-weight:700;color:#94a3b8;letter-spacing:1px">🎲 جاري التوزيع العشوائي...</div>
  <div id="spin-wheel" style="font-size:2.2rem;font-weight:900;color:#fff;min-height:52px;text-align:center;text-shadow:0 0 30px rgba(124,58,237,.8);"></div>
  <div id="spin-result" style="display:none;text-align:center;color:#fff;"></div>
</div>
