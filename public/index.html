<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huroof ma3 Hassan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Tajawal:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-light:#dcfce7;--green-dark:#14532d;
  --orange:#ea580c;--orange-light:#ffedd5;--orange-dark:#7c2d12;
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--muted2:#94a3b8;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}

/* ══ LANG SWITCH ══ */
#lang-switch{
  position:fixed;top:16px;right:16px;z-index:9999;
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:6px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  cursor:pointer;user-select:none;transition:box-shadow .2s;
}
#lang-switch:hover{box-shadow:0 4px 18px rgba(0,0,0,.13);}
.lang-lbl{font-size:.72rem;font-weight:700;color:var(--muted2);transition:color .2s;line-height:1;}
.lang-lbl.on{color:var(--text);}
.lang-pill{
  width:38px;height:20px;border-radius:50px;background:#e2e8f0;
  position:relative;transition:background .3s;flex-shrink:0;
}
.lang-pill.ar-on{background:var(--green);}
.lang-pill::after{
  content:'';position:absolute;
  width:14px;height:14px;border-radius:50%;background:#fff;
  top:3px;left:3px;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
.lang-pill.ar-on::after{transform:translateX(18px);}

/* ══ RTL overrides when Arabic ══ */
body.ar{font-family:'Tajawal',sans-serif;direction:rtl;}
body.ar #lang-switch{right:auto;left:16px;}
body.ar .auth-card{direction:rtl;font-family:'Tajawal',sans-serif;}
body.ar .auth-inp{font-family:'Tajawal',sans-serif;text-align:right;}
body.ar .tbtn{font-family:'Tajawal',sans-serif;}

/* ══ STAGE SYSTEM ══ */
.stage{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;}
.stage.active{display:flex;}
.fade-out{animation:fadeOut .45s ease forwards;}
@keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}

/* ══ ESCAPE BUTTON ══ */
#s-escape{background:var(--bg);}
.escape-bg-circles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.escape-bg-circles span{position:absolute;border-radius:50%;border:1.5px solid var(--border);animation:circleExpand 6s ease-in-out infinite;}
.escape-bg-circles span:nth-child(1){width:300px;height:300px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:0s;}
.escape-bg-circles span:nth-child(2){width:500px;height:500px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:.8s;}
.escape-bg-circles span:nth-child(3){width:700px;height:700px;left:50%;top:50%;transform:translate(-50%,-50%);animation-delay:1.6s;}
@keyframes circleExpand{0%,100%{opacity:.25}50%{opacity:.08}}
.game-logo{font-size:2rem;font-weight:900;text-align:center;margin-bottom:48px;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.game-logo-sub{font-size:.82rem;font-weight:400;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:2px;}
#escape-btn{
  position:absolute;width:120px;height:120px;border-radius:50%;border:none;
  background:linear-gradient(145deg,var(--green),#22c55e);
  color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;
  box-shadow:0 8px 0 var(--green-dark),0 12px 28px rgba(22,163,74,.35),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .1s,box-shadow .1s;user-select:none;
  transform:translate(-50%,-50%);left:50%;top:50%;
}
#escape-btn:active{box-shadow:0 3px 0 var(--green-dark),0 4px 12px rgba(22,163,74,.25),inset 0 1px 0 rgba(255,255,255,.25);transform:translate(-50%,-50%) translateY(5px);}
.escape-hint{position:absolute;bottom:48px;color:var(--muted2);font-size:.82rem;}

/* ══ TTY ══ */
#s-tty{background:var(--bg);}
.laptop-wrap{animation:laptopOpen .8s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes laptopOpen{from{transform:rotateX(-40deg) translateY(50px);opacity:0}to{transform:rotateX(0) translateY(0);opacity:1}}
.laptop-screen{width:min(680px,96vw);height:min(420px,70vh);background:#0a0e14;border:2px solid #1e2938;border-radius:14px 14px 3px 3px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 0 1px #111,0 50px 100px rgba(0,0,0,.3);}
.titlebar{background:#111820;border-bottom:1px solid #1e2938;padding:8px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tdot{width:10px;height:10px;border-radius:50%;}
.tty-body{flex:1;padding:18px 22px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#00ff41;scrollbar-width:none;direction:ltr;}
.tty-body::-webkit-scrollbar{display:none;}
.tty-line{line-height:1.75;white-space:pre-wrap;}
.c-dim{color:#2d5a3d}.c-white{color:#c8d4df}.c-yellow{color:#facc15}
.inp-row{display:flex;align-items:center;gap:8px;margin-top:2px;}
.tty-prompt{color:#00ff41;white-space:nowrap;font-size:13px;font-family:'IBM Plex Mono',monospace;}
.tty-field{background:transparent;border:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;flex:1;caret-color:#00ff41;}
.team-btns{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.tbtn{padding:8px 20px;border-radius:8px;border:1px solid;font-size:.92rem;font-weight:700;cursor:pointer;background:transparent;transition:all .2s;font-family:'Inter',sans-serif;}
body.ar .tbtn{font-family:'Tajawal',sans-serif;}
.tbtn.g{border-color:var(--green);color:var(--green)}.tbtn.g:hover,.tbtn.sg{background:rgba(22,163,74,.18);}
.tbtn.o{border-color:var(--orange);color:var(--orange)}.tbtn.o:hover,.tbtn.so{background:rgba(234,88,12,.18);}
.tbtn.r{border-color:#7c3aed;color:#7c3aed}.tbtn.r:hover,.tbtn.sr{background:rgba(124,58,237,.18);}
.cur{display:inline-block;width:7px;height:13px;background:#00ff41;animation:blink 1s step-end infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.laptop-base{width:min(680px,96vw);height:16px;background:linear-gradient(180deg,#1a1a1a,#111);border-radius:0 0 8px 8px;border:2px solid #1e2938;border-top:none;}

/* ══ AUTH ══ */
#s-auth{background:var(--bg);z-index:200;}
.auth-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:36px;width:380px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.auth-logo{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-align:center;}
.auth-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:22px;}
.auth-tabs{display:flex;margin-bottom:22px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:.88rem;font-weight:700;cursor:pointer;background:var(--bg);color:var(--muted);border:none;transition:all .2s;font-family:inherit;}
.auth-tab.on{background:var(--surface);color:var(--text);}
.auth-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:.95rem;outline:none;margin-bottom:10px;transition:border-color .2s;font-family:inherit;}
.auth-inp:focus{border-color:var(--green);}
.auth-domain{font-size:.82rem;font-weight:700;color:var(--muted);white-space:nowrap;margin-bottom:10px;}
.auth-btn{width:100%;padding:12px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(22,163,74,.3);transition:all .15s;margin-top:4px;font-family:inherit;}
.auth-btn:hover{transform:translateY(-1px);}
.auth-err{font-size:.82rem;color:#dc2626;min-height:18px;text-align:center;margin-top:4px;}
.auth-skip{font-size:.75rem;color:var(--muted2);text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline;}

/* ══ SURVEY ══ */
.s-star{width:36px;height:36px;border-radius:6px;border:1px solid #2d5a3d;background:#0a0e14;color:#2d5a3d;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.s-star.on{background:#d97706;border-color:#d97706;color:#fff;}
.s-star:hover{border-color:#facc15;color:#facc15;}
.survey-done-btn{margin-top:10px;padding:7px 20px;border-radius:7px;border:1px solid #22c55e;background:rgba(22,197,94,.15);color:#22c55e;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.survey-done-btn:hover{background:rgba(22,197,94,.25);}

/* ══ TUTORIAL ══ */
#tutorial-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(5,8,18,.88);backdrop-filter:blur(6px);align-items:center;justify-content:center;cursor:pointer;}
#tutorial-overlay.active{display:flex;}
.tut-card{background:#fff;border-radius:22px;padding:36px 40px;max-width:400px;width:92vw;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:tutIn .4s cubic-bezier(.34,1.4,.64,1);pointer-events:none;position:relative;direction:ltr;}
body.ar .tut-card{direction:rtl;font-family:'Tajawal',sans-serif;}
@keyframes tutIn{from{opacity:0;transform:scale(.82) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tut-exit{animation:tutOut .3s ease forwards;}
@keyframes tutOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.88) translateY(-20px)}}
.tut-icon{font-size:3.8rem;margin-bottom:12px;line-height:1;display:block;}
.tut-step{font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.tut-title{font-size:1.35rem;font-weight:900;color:#1e293b;margin-bottom:10px;line-height:1.3;}
.tut-body{font-size:.92rem;color:#475569;line-height:1.65;margin-bottom:18px;}
.tut-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:all .3s;}
.tut-dot.on{background:#16a34a;width:20px;}
.tut-hint{font-size:.75rem;color:#94a3b8;animation:blink2 2s ease infinite;}
@keyframes blink2{0%,100%{opacity:.5}50%{opacity:1}}
.tut-skip{position:absolute;top:14px;left:16px;font-size:.72rem;color:#94a3b8;pointer-events:all;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;}
</style>
</head>

</div>

<!-- STAGE 1: ESCAPE BUTTON -->
<div class="stage" id="s-escape">

</div>

      </div>

    </div>
    <div class="laptop-base"></div>

</div>

function t(){ return T[currentLang]; }

function applyLang(){
  const isAr = currentLang === 'ar';
  document.documentElement.lang = isAr ? 'ar' : 'en';
  document.documentElement.dir  = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('ar', isAr);

  // pill
  document.getElementById('lang-pill').classList.toggle('ar-on', isAr);
  document.getElementById('lbl-en').classList.toggle('on', !isAr);
  document.getElementById('lbl-ar').classList.toggle('on', isAr);

  // auth texts
  document.getElementById('auth-logo').textContent = t().authLogo;
  document.getElementById('auth-sub').textContent  = t().authSub;
  document.getElementById('escape-logo').childNodes[0].textContent = t().escapeLogo + '\n';
  document.getElementById('escape-sub').textContent  = t().escapeSub;
  document.getElementById('escape-hint').textContent = t().escapeHint;
  document.getElementById('escape-btn').textContent  = 'Enter';

  // tabs & buttons
  ['tab-login','tab-register','btn-register','btn-login','auth-skip'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){ const key = isAr ? 'data-ar' : 'data-en'; el.textContent = el.getAttribute(key) || el.textContent; }
  });

  // placeholders
  document.querySelectorAll('.auth-inp[data-ph-en]').forEach(el=>{
    el.placeholder = isAr ? el.getAttribute('data-ph-ar') : el.getAttribute('data-ph-en');
  });

  localStorage.setItem('hasan_lang', currentLang);
}

function toggleLang(){
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  applyLang();
}

// ══ AUTH ══
function switchAuthTab(tab){
  document.getElementById('form-register').style.display = tab==='register'?'block':'none';
  document.getElementById('form-login').style.display    = tab==='login'?'block':'none';
  document.getElementById('tab-register').classList.toggle('on', tab==='register');
  document.getElementById('tab-login').classList.toggle('on', tab==='login');
}

window.addEventListener('DOMContentLoaded',()=>{
  applyLang();
  const saved = localStorage.getItem('hasan_username');
  if(saved){ switchAuthTab('login'); const el=document.getElementById('login-username'); if(el) el.value=saved; }
  else switchAuthTab('register');
});

async function doRegister(){
  const username   = document.getElementById('reg-username').value.trim();
  const emailLocal = document.getElementById('reg-email-local').value.trim();
  const password   = document.getElementById('reg-password').value;
  const title      = document.getElementById('reg-title').value.trim();
  const errEl      = document.getElementById('reg-err');
  errEl.textContent='';
  if(!username||!emailLocal||!password){ errEl.textContent= currentLang==='ar'?'اكمل البيانات':'Fill in all fields'; return; }
  const email = emailLocal+'@7snn.onion';
  const res  = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password,title})});
  const data = await res.json();
  if(!data.ok){ errEl.textContent=data.msg; return; }
  localStorage.setItem('hasan_username', username);
  dbUsername = username;
  goToEscape();
}

async function doLoginAuth(){
  const username = document.getElementById('login-username').value.trim();
  const errEl    = document.getElementById('login-err-auth');
  errEl.textContent='';
  if(!username){ errEl.textContent= currentLang==='ar'?'ادخل اسم المستخدم':'Enter your username'; return; }
  const res  = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  const data = await res.json();
  if(!data.ok){ errEl.textContent=data.msg; return; }
  localStorage.setItem('hasan_username', username);
  dbUsername = username;
  const p = data.profile;
  const isAr = currentLang==='ar';
  const card = document.querySelector('#s-auth .auth-card');
  card.innerHTML = '<div class="auth-logo">'+(isAr?'اهلا ':'Welcome ')+ p.username +'!</div>'
    + '<div style="text-align:center;margin:16px 0">'
    + '<div style="font-size:2.5rem">'+(p.badge||'🎮')+'</div>'
    + '<div style="font-weight:900;font-size:1.1rem;margin:6px 0">'+(p.title||(isAr?'لاعب':'Player'))+'</div>'
    + '<div style="color:var(--muted);font-size:.82rem">'+(isAr?'ليفل ':'Level ')+p.level+(p.prestige>0?(isAr?' • بريستيج ':' • Prestige ')+p.prestige:'')+'</div>'
    + '<div style="display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:.82rem;color:var(--muted)">'
    + '<span>✓ '+p.correct_answers+(isAr?' إجابة':' answers')+'</span>'
    + '<span>🎮 '+p.total_matches+(isAr?' مباراة':' matches')+'</span>'
    + '</div></div>'
    + '<button class="auth-btn" onclick="goToEscape()">▶️ '+(isAr?'الدخول للعبة':'Enter Game')+'</button>';
}

function skipAuth(){ dbUsername=''; goToEscape(); }

function goToEscape(){
  const s0=document.getElementById('s-auth');
  s0.classList.add('fade-out');
  setTimeout(()=>{
    s0.classList.remove('active','fade-out');
    document.getElementById('s-escape').classList.add('active');

}

// ══ ESCAPE BUTTON ══
const btn = document.getElementById('escape-btn');
let btnCaught=false, escapeEnabled=false, moveCount=0;
const MAX_MOVES=12;
setTimeout(()=>{ escapeEnabled=true; },900);
btn.addEventListener('mouseenter', moveAway);
btn.addEventListener('touchstart',(e)=>{ e.preventDefault(); moveAway(); },{passive:false});

function moveAway(){
  if(!escapeEnabled||btnCaught||moveCount>=MAX_MOVES) return;
  moveCount++;
  const vw=window.innerWidth,vh=window.innerHeight,m=80;
  const x=m+Math.random()*(vw-120-m*2), y=m+Math.random()*(vh-120-m*2);
  btn.style.left=x+'px'; btn.style.top=y+'px';
  btn.style.transition='left .3s cubic-bezier(.34,1.56,.64,1),top .3s cubic-bezier(.34,1.56,.64,1)';
}

function catchBtn(){
  btnCaught=true;
  btn.textContent=t().escapeCaught;
  btn.style.background='linear-gradient(145deg,#f97316,#ea580c)';
  btn.style.transition='all .3s';
  setTimeout(goToTTY,500);
}

// ══ TTY ══
function goToTTY(){
  const s1=document.getElementById('s-escape');
  s1.classList.add('fade-out');
  setTimeout(()=>{
    s1.classList.remove('active','fade-out');
    document.getElementById('s-tty').classList.add('active');
    startTTY();
  },450);
}

function addLine(text,cls){
  const body=document.getElementById('tty-body');
  const div=document.createElement('div');
  div.className='tty-line'+(cls?' '+cls:'');
  div.innerHTML=text||'\u00a0';
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
  return div;
}

function startTTY(){
  t().bootLines.forEach(l=>{ setTimeout(()=>{ addLine(l.t,l.cls); },l.d); });
  setTimeout(showNamePrompt,1580);
}

function showNamePrompt(){
  if(dbUsername){ playerName=dbUsername; setTimeout(showTeamPrompt,300); return; }
  addLine(t().namePrompt);
  const body=document.getElementById('tty-body');
  const row=document.createElement('div'); row.className='inp-row';
  row.innerHTML='<span class="tty-prompt">player@7oroof:~$</span><input class="tty-field" id="name-inp" maxlength="20" autocomplete="off"><span class="cur"></span>';
  body.appendChild(row); body.scrollTop=body.scrollHeight;
  const inp=document.getElementById('name-inp'); inp.focus();
  inp.addEventListener('keydown',function(e){
    if(e.key!=='Enter') return;
    const v=inp.value.trim(); if(!v) return;
    playerName=v;
    row.innerHTML='<span class="tty-prompt">player@7oroof:~$</span> <span style="color:#fff">'+v+'</span>';
    setTimeout(showTeamPrompt,300);
  });
}

function showTeamPrompt(){
  const body=document.getElementById('tty-body');
  addLine(''); addLine(t().teamPrompt); addLine('');
  const wrap=document.createElement('div'); wrap.className='team-btns';
  wrap.innerHTML='<button class="tbtn g" onclick="pickTeam(\'green\',this)">'+t().teamGreen+' ('+getCount('green')+'/2)</button>'
    +'<button class="tbtn o" onclick="pickTeam(\'orange\',this)">'+t().teamOrange+' ('+getCount('orange')+'/2)</button>'
    +'<button class="tbtn r" onclick="pickTeam(\'random\',this)">'+t().teamRandom+'</button>';
  body.appendChild(wrap); body.scrollTop=body.scrollHeight;
}

function getCount(t2){ return Object.values((window._latestState||{players:{}}).players).filter(p=>p.team===t2).length; }
socket.on('gameState',state=>{ window._latestState=state; });

function pickTeam(team,btnEl){
  playerTeam=team;
  document.querySelectorAll('.tbtn').forEach(b=>{ b.disabled=true; });
  if(team==='green') btnEl.classList.add('sg');
  else if(team==='orange') btnEl.classList.add('so');
  else btnEl.classList.add('sr');
  addLine(''); addLine(t().pickedTeam(team));
  setTimeout(()=>{
    addLine(t().joining);
    socket.emit('playerJoin',{name:playerName,team,inviteCode:'__auto__',dbUsername:dbUsername||null});
  },600);
}

socket.on('joinOk',()=>{
  addLine(''); addLine(t().joinOk,'c-yellow');
  showSurvey();
});
socket.on('joinFail',msg=>{
  addLine(''); addLine(t().joinFail(msg));
  setTimeout(()=>{ document.querySelectorAll('.tbtn').forEach(b=>{ b.disabled=false; b.classList.remove('sg','so','sr'); }); },800);
});
socket.on('teamsAssigned',assignments=>{

  playerTeam=myData.team; sessionStorage.setItem('playerTeam',playerTeam);

// ══ SURVEY ══
const surveyAnswers={};
let surveyIdx=0;

function showSurvey(){
  if(localStorage.getItem('survey_done')==='1'){ submitSurvey(); return; }
  surveyIdx=0;
  addLine(''); addLine(t().surveyTitle,'c-yellow');
  addLine(t().surveyHint,'c-white'); addLine('');
  showSurveyQ();
}

function showSurveyQ(){
  const body=document.getElementById('tty-body');
  const QUESTIONS = t().surveyQ;
  const q=QUESTIONS[surveyIdx];
  if(!q){ finishSurvey(); return; }
  const qEl=document.createElement('div');
  qEl.className='tty-line c-white'; qEl.style.marginBottom='8px';
  qEl.innerHTML='<span style="color:#facc15">'+q.emoji+'</span> '+q.q;
  body.appendChild(qEl);
  var chosen=q.type==='stars'?3:null, inputEl=null;

  function getAnswer(){
    if(q.type==='stars') return {val:chosen,label:chosen};
    if(q.type==='text'||q.type==='choice_or_text'){
      var v=inputEl&&inputEl.tagName==='INPUT'?inputEl.value.trim():(Array.isArray(inputEl)?inputEl[1].value.trim():'');
      return {val:v||chosen||'—',label:v||chosen||'—'};
    }
    return {val:chosen||q.choices[1],label:chosen||q.choices[1]};
  }

  if(q.type==='stars'){
    var wrap=document.createElement('div'); wrap.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
    var emojis=['😐','🙂','😊','😎','🔥'];
    for(var i=1;i<=5;i++){
      (function(num){
        var s=document.createElement('button');
        s.className='s-star'+(num<=chosen?' on':'');
        s.textContent=emojis[num-1];
        s.onclick=function(){ chosen=num; wrap.querySelectorAll('.s-star').forEach(function(b,j){ b.classList.toggle('on',j<num); }); };
        wrap.appendChild(s);
      })(i);
    }
    body.appendChild(wrap); inputEl=wrap;
  }else if(q.type==='text'){
    var inp=document.createElement('input');
    inp.style.cssText='width:100%;background:#111820;border:1px solid #2d5a3d;border-radius:6px;padding:7px 10px;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:12px;margin-bottom:10px;outline:none;';
    inp.placeholder=q.placeholder||''; inp.maxLength=200;
    body.appendChild(inp); inputEl=inp;
    setTimeout(()=>{ inp.focus(); },50);
  }else if(q.type==='choice_or_text'){
    var cWrap=document.createElement('div'); cWrap.style.cssText='display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;';
    q.choices.forEach(function(c){
      var b=document.createElement('button'); b.className='survey-done-btn';
      b.style.cssText='padding:5px 14px;font-size:.82rem;opacity:.6;'; b.textContent=c;
      b.onclick=function(){ chosen=c; cWrap.querySelectorAll('button').forEach(x=>{ x.style.opacity='.5'; }); b.style.opacity='1'; b.style.borderColor='#facc15'; b.style.color='#facc15'; };
      cWrap.appendChild(b);
    });
    var cInp=document.createElement('input');
    cInp.style.cssText='width:100%;background:#111820;border:1px solid #2d5a3d;border-radius:6px;padding:7px 10px;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:12px;margin-bottom:10px;outline:none;';
    cInp.placeholder=currentLang==='ar'?'او اكتب بكلامك...':'or type your answer...'; cInp.maxLength=200;
    body.appendChild(cWrap); body.appendChild(cInp);
    inputEl=[cWrap,cInp];
  }else if(q.type==='yesno'){
    var yWrap=document.createElement('div'); yWrap.style.cssText='display:flex;gap:8px;margin-bottom:10px;';
    q.choices.forEach(function(c){
      var b=document.createElement('button'); b.className='survey-done-btn';
      b.style.cssText='padding:5px 18px;font-size:.85rem;opacity:.6;'; b.textContent=c;
      b.onclick=function(){
        chosen=c; yWrap.querySelectorAll('button').forEach(x=>{ x.style.opacity='.5'; });
        b.style.opacity='1'; b.style.borderColor='#facc15'; b.style.color='#facc15';
        if(c===q.choices[0]){ surveyAnswers[q.key]=c; finishSurvey(); }
      };
      yWrap.appendChild(b);
    });
    body.appendChild(yWrap); inputEl=yWrap;
  }

  const QUESTIONS2 = t().surveyQ;
  var nextBtn=document.createElement('button');
  nextBtn.className='survey-done-btn'; nextBtn.style.marginTop='2px';
  nextBtn.textContent=surveyIdx===QUESTIONS2.length-1?t().surveyDone:t().surveyNext;
  nextBtn.onclick=function(){
    var ans=getAnswer(); surveyAnswers[q.key]=ans.val;
    qEl.remove();
    if(Array.isArray(inputEl)) inputEl.forEach(x=>x.remove()); else if(inputEl) inputEl.remove();
    nextBtn.remove();
    addLine('> '+q.emoji+' '+String(ans.label).slice(0,40),'c-dim');
    surveyIdx++; showSurveyQ();
  };
  body.appendChild(nextBtn);
  body.scrollTop=body.scrollHeight;
}

function finishSurvey(){ localStorage.setItem('survey_done','1'); submitSurvey(); }

function submitSurvey(){
  var scores={};
  ['كروي','ديني','علوم','جغرافيا','علمي','ثقافي'].forEach(k=>{ scores[k]=surveyAnswers['s_'+k]||3; });
  socket.emit('submitSurvey',scores);
  addLine(''); addLine(t().submitOk,'c-yellow');
  addLine(t().waitHost,'c-dim');
  joined=true;
  sessionStorage.setItem('playerName',playerName);
  sessionStorage.setItem('playerTeam',playerTeam);
  sessionStorage.setItem('inviteCode','__auto__');
}

// ══ SPINNER ══
function showSpinnerOverlay(assignments,myTeam){
  var ov=document.getElementById('spin-overlay'); if(!ov) return;
  ov.style.display='flex';
  document.getElementById('spin-title').textContent=t().spinTitle;
  var spinEl=document.getElementById('spin-wheel');
  var names=Object.values(assignments).map(p=>p.name);
  var i=0,ticks=0;
  var ticker=setInterval(()=>{
    spinEl.textContent=names[i%names.length]; i++; ticks++;
    if(ticks>30){ clearInterval(ticker); showTeamResults(assignments,myTeam); }
  },80);
}
function showTeamResults(assignments,myTeam){
  var spinEl=document.getElementById('spin-wheel');
  var resultEl=document.getElementById('spin-result');
  var state=window._latestState||{};
  var greens=Object.values(assignments).filter(p=>p.team==='green').map(p=>p.name);
  var oranges=Object.values(assignments).filter(p=>p.team==='orange').map(p=>p.name);
  var gName=(state.teamNames||{}).green||(currentLang==='ar'?'الأخضر':'Green');
  var oName=(state.teamNames||{}).orange||(currentLang==='ar'?'البرتقالي':'Orange');
  spinEl.textContent=myTeam==='green'?'🟢':'🟠'; spinEl.style.fontSize='4rem';
  resultEl.innerHTML='<div style="font-size:1.1rem;font-weight:900;margin-bottom:14px">'+t().teamAssigned(myTeam,gName,oName)+'</div>'
    +'<div style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap;">'
    +'<div style="background:#dcfce7;border:2px solid #86efac;border-radius:10px;padding:10px 18px;min-width:110px;"><div style="font-size:.7rem;font-weight:700;color:#14532d;margin-bottom:6px">'+gName+'</div>'+greens.map(n=>'<div style="font-weight:700;font-size:.9rem">'+n+'</div>').join('')+'</div>'
    +'<div style="background:#ffedd5;border:2px solid #fdba74;border-radius:10px;padding:10px 18px;min-width:110px;"><div style="font-size:.7rem;font-weight:700;color:#7c2d12;margin-bottom:6px">'+oName+'</div>'+oranges.map(n=>'<div style="font-weight:700;font-size:.9rem">'+n+'</div>').join('')+'</div>'
    +'</div><div style="margin-top:16px;font-size:.8rem;color:#64748b">'+t().waitingHost+'</div>';
  resultEl.style.display='block';
  setTimeout(()=>{ document.getElementById('spin-overlay').style.display='none'; },5000);
}

function startIndexTutorial(){
  if(localStorage.getItem('tut_index_done')==='1') return;
  showTutorial(t().tutSteps,'tut_index_done');
}
var _tutSteps=[],_tutIdx=0,_tutKey='';
function showTutorial(steps,key){
  _tutSteps=steps;_tutIdx=0;_tutKey=key;
  document.getElementById('tutorial-overlay').classList.add('active');
  renderTutStep();
  document.getElementById('tutorial-overlay').onclick=nextTutStep;
}
function renderTutStep(){
  var s=_tutSteps[_tutIdx],total=_tutSteps.length;
  document.getElementById('tut-card').innerHTML=
    '<span class="tut-skip" onclick="closeTutorial(event)">'+t().tutSkip+'</span>'
    +'<span class="tut-icon">'+s.icon+'</span>'
    +'<div class="tut-step">'+(_tutIdx+1)+' / '+total+'</div>'
    +'<div class="tut-title">'+s.title+'</div>'
    +'<div class="tut-body">'+s.body+'</div>'
    +'<div class="tut-dots">'+_tutSteps.map((_,i)=>'<div class="tut-dot'+(i===_tutIdx?' on':'')+'"></div>').join('')+'</div>'
    +'<div class="tut-hint">'+(_tutIdx===total-1?t().tutFinish:t().tutNext)+'</div>';
  var c=document.getElementById('tut-card'); c.classList.remove('tut-exit'); void c.offsetWidth;
}
function nextTutStep(e){
  if(e.target.classList.contains('tut-skip')) return;
  if(_tutIdx>=_tutSteps.length-1){ closeTutorial(); return; }
  var c=document.getElementById('tut-card'); c.classList.add('tut-exit');
  setTimeout(()=>{ _tutIdx++; renderTutStep(); },280);
}
function closeTutorial(e){ if(e) e.stopPropagation(); localStorage.setItem(_tutKey,'1'); document.getElementById('tutorial-overlay').classList.remove('active'); }
</script>

<!-- SPINNER OVERLAY -->
<div id="spin-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,15,30,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(6px);">
  <div id="spin-title" style="font-size:.9rem;font-weight:700;color:#94a3b8;letter-spacing:1px">🎲 Assigning teams randomly...</div>
  <div id="spin-wheel" style="font-size:2.2rem;font-weight:900;color:#fff;min-height:52px;text-align:center;text-shadow:0 0 30px rgba(124,58,237,.8);"></div>
  <div id="spin-result" style="display:none;text-align:center;color:#fff;font-family:'Tajawal',sans-serif;"></div>
</div>

<!-- TUTORIAL OVERLAY -->
<div id="tutorial-overlay">
  <div class="tut-card" id="tut-card"></div>
</div>
</body>
