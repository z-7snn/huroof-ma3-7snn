<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حروف مع حسن</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#22c55e;--orange:#f97316;--muted:#4b5563}
html,body{width:100%;height:100%;background:#000;color:#e2e8f0;font-family:'Tajawal',sans-serif;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);pointer-events:none;z-index:9999}

/* ── SHARED ── */
.stage{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column}
.fade-out{animation:fadeOut .5s ease forwards}
.fade-in{animation:fadeIn .6s ease forwards}
@keyframes fadeOut{from{opacity:1}to{opacity:0;pointer-events:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══════════════════════════════════════
   STAGE 1 — DARKNESS + FIGURE + QUESTION
══════════════════════════════════════ */
#s-dark{background:#000;z-index:100;display:flex}

/* particle stars */
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--d,4s) var(--delay,0s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.4)}}

/* figure */
.figure-wrap{position:relative;margin-bottom:48px;opacity:0;transition:opacity 2.4s ease}
.figure-wrap.show{opacity:1}

/* SVG silhouette */
.figure-svg{filter:drop-shadow(0 0 30px rgba(255,255,255,0.06))}

/* question box */
.q-box{text-align:center;width:90%;max-width:460px;opacity:0;transition:opacity 1.4s ease}
.q-box.show{opacity:1}
.q-title{font-size:1.3rem;font-weight:900;color:rgba(255,255,255,0.88);line-height:1.6;margin-bottom:20px;text-shadow:0 0 40px rgba(255,255,255,0.08)}
.q-answers{display:flex;flex-direction:column;gap:9px;align-items:center}
.q-btn{width:260px;padding:10px 24px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
.q-btn:hover:not(:disabled){border-color:rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);color:#fff}
.q-btn.wrong{border-color:#ef4444!important;background:rgba(239,68,68,0.12)!important;color:#ef4444!important;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* code reveal */
.code-reveal{text-align:center;opacity:0;transition:opacity 1s ease}
.code-reveal.show{opacity:1}
.code-label{color:rgba(255,255,255,0.5);font-size:.9rem;margin-bottom:10px}
.code-value{font-size:3rem;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:codePulse 2s ease-in-out infinite}
@keyframes codePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.code-hint{color:rgba(255,255,255,0.35);font-size:.82rem;margin-top:14px}
.code-continue-btn{margin-top:24px;padding:11px 36px;border-radius:10px;border:1px solid rgba(34,197,94,0.4);background:rgba(34,197,94,0.1);color:var(--green);font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.code-continue-btn:hover{background:rgba(34,197,94,0.2);border-color:var(--green)}

/* ══════════════════════════════════════
   STAGE 2 — INVITE CODE INPUT
══════════════════════════════════════ */
#s-invite{background:#000;z-index:200}
.invite-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 35% at 50% 50%,rgba(34,197,94,0.05),transparent 70%);pointer-events:none}
.invite-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;padding:48px 44px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:20px;width:360px;max-width:95vw}
.invite-logo{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.invite-sub{color:var(--muted);font-size:.85rem;margin-top:-10px}
.invite-label{font-size:.8rem;color:var(--muted);align-self:flex-start}
.invite-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 18px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1.15rem;font-weight:700;text-align:center;letter-spacing:5px;outline:none;transition:border-color .2s,box-shadow .2s}
.invite-input:focus{border-color:rgba(34,197,94,0.45);box-shadow:0 0 0 3px rgba(34,197,94,0.09)}
.invite-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(34,197,94,0.25)}
.invite-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(34,197,94,0.35)}
.invite-err{font-size:.88rem;color:#ef4444;min-height:20px;text-align:center}
.back-link{font-size:.82rem;color:var(--muted);cursor:pointer;border-bottom:1px dashed var(--muted);transition:color .2s}
.back-link:hover{color:rgba(255,255,255,.5)}

/* ══════════════════════════════════════
   STAGE 3 — LAPTOP TTY
══════════════════════════════════════ */
#s-laptop{background:#000;z-index:300}
.laptop-wrap{animation:laptopOpen .9s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes laptopOpen{from{transform:rotateX(-45deg) translateY(60px);opacity:0}to{transform:rotateX(0) translateY(0);opacity:1}}
.laptop-screen{width:min(680px,96vw);height:min(400px,68vh);background:#050505;border:2px solid #1e1e1e;border-radius:14px 14px 3px 3px;overflow:hidden;box-shadow:0 0 0 1px #2a2a2a,0 50px 100px rgba(0,0,0,.95),inset 0 0 80px rgba(0,255,65,.02);display:flex;flex-direction:column}
.titlebar{background:#111;border-bottom:1px solid #1e1e1e;padding:8px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tdot{width:10px;height:10px;border-radius:50%}
.tty-body{flex:1;padding:18px 22px;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#00ff41;scrollbar-width:none}
.tty-body::-webkit-scrollbar{display:none}
.tty-line{line-height:1.75;white-space:pre-wrap}
.c-dim{color:#004d14}.c-white{color:#bbb}.c-yellow{color:#facc15}
.inp-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.tty-prompt{color:#00ff41;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:13px}
.tty-field{background:transparent;border:none;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;flex:1;caret-color:#00ff41}
.team-btns{display:flex;gap:12px;margin-top:8px}
.tbtn{padding:8px 22px;border-radius:8px;border:1px solid;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;background:transparent;transition:all .2s}
.tbtn.g{border-color:var(--green);color:var(--green)}.tbtn.g:hover{background:rgba(34,197,94,.14)}
.tbtn.o{border-color:var(--orange);color:var(--orange)}.tbtn.o:hover{background:rgba(249,115,22,.14)}
.tbtn.sg{background:rgba(34,197,94,.2);box-shadow:0 0 14px rgba(34,197,94,.3)}
.tbtn.so{background:rgba(249,115,22,.2);box-shadow:0 0 14px rgba(249,115,22,.3)}
.laptop-base{width:min(680px,96vw);height:16px;background:linear-gradient(180deg,#181818,#101010);border-radius:0 0 8px 8px;border:2px solid #1e1e1e;border-top:none}
.cur{display:inline-block;width:7px;height:13px;background:#00ff41;animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<!-- STAGE 1: DARK + FIGURE + QUESTION -->
<div class="stage" id="s-dark">
  <div class="stars" id="stars"></div>

  <div class="figure-wrap" id="figure-wrap">
    <svg class="figure-svg" width="80" height="160" viewBox="0 0 80 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- head -->
      <ellipse cx="40" cy="24" rx="18" ry="20" fill="rgba(255,255,255,0.07)"/>
      <!-- neck -->
      <rect x="34" y="42" width="12" height="10" rx="4" fill="rgba(255,255,255,0.05)"/>
      <!-- body -->
      <path d="M18 54 Q40 50 62 54 L66 110 Q40 115 14 110 Z" fill="rgba(255,255,255,0.05)"/>
      <!-- left arm -->
      <path d="M18 58 Q6 80 10 100" stroke="rgba(255,255,255,0.07)" stroke-width="8" stroke-linecap="round"/>
      <!-- right arm -->
      <path d="M62 58 Q74 80 70 100" stroke="rgba(255,255,255,0.07)" stroke-width="8" stroke-linecap="round"/>
      <!-- left leg -->
      <path d="M28 110 Q24 135 22 155" stroke="rgba(255,255,255,0.06)" stroke-width="9" stroke-linecap="round"/>
      <!-- right leg -->
      <path d="M52 110 Q56 135 58 155" stroke="rgba(255,255,255,0.06)" stroke-width="9" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- question -->
  <div class="q-box" id="q-box">
    <div class="q-title">ما هو أصعب تخصص في الحاسب؟</div>
    <div class="q-answers">
      <button class="q-btn" onclick="answerQ(this,false)">هندسة البرمجيات</button>
      <button class="q-btn" onclick="answerQ(this,true)">الذكاء الاصطناعي</button>
      <button class="q-btn" onclick="answerQ(this,false)">الشبكات والأمن</button>
      <button class="q-btn" onclick="answerQ(this,false)">قواعد البيانات</button>
    </div>
  </div>

  <!-- code reveal (hidden until correct answer) -->
  <div class="code-reveal" id="code-reveal">
    <div class="code-label">رمز الدعوة هو:</div>
    <div class="code-value" id="code-value">—</div>
    <div class="code-hint">احفظ الرمز، ستحتاجه في الخطوة التالية</div>
    <button class="code-continue-btn" onclick="goToInvite()">← تسجيل الدخول</button>
  </div>
</div>

<!-- STAGE 2: ENTER INVITE CODE -->
<div class="stage" id="s-invite">
  <div class="invite-glow"></div>
  <div class="invite-card">
    <div class="invite-logo">حروف مع حسن</div>
    <div class="invite-sub">أدخل رمز الدعوة</div>
    <div class="invite-label">الرمز</div>
    <input class="invite-input" id="invite-inp" type="text" placeholder="• • • • •" autocomplete="off" onkeydown="if(event.key==='Enter')checkInvite()">
    <button class="invite-btn" onclick="checkInvite()">دخول</button>
    <span class="back-link" onclick="goBack()">↩ نسيت الرمز؟ ارجع</span>
    <div class="invite-err" id="invite-err"></div>
  </div>
</div>

<!-- STAGE 3: LAPTOP TTY -->
<div class="stage" id="s-laptop">
  <div class="laptop-wrap">
    <div class="laptop-screen">
      <div class="titlebar">
        <div class="tdot" style="background:#ff5f57"></div>
        <div class="tdot" style="background:#febc2e"></div>
        <div class="tdot" style="background:#28c840"></div>
        <span style="color:#444;font-size:11px;font-family:'IBM Plex Mono',monospace;margin-right:auto">hassan@7oroof ~ bash</span>
      </div>
      <div class="tty-body" id="tty-body"></div>
    </div>
    <div class="laptop-base"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let savedCode = '';
let playerName = '';
let playerTeam = '';

// ─── Generate stars ───
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*4}s;--op:${0.2+Math.random()*0.5}`;
  starsEl.appendChild(s);
}

// ─── Start: show darkness stage ───
window.addEventListener('load', () => {
  const dark = document.getElementById('s-dark');
  dark.style.display = 'flex';

  // Figure appears
  setTimeout(() => document.getElementById('figure-wrap').classList.add('show'), 400);
  // Question appears
  setTimeout(() => document.getElementById('q-box').classList.add('show'), 2200);
});

// ─── STAGE 1: Answer question ───
function answerQ(btn, correct) {
  document.querySelectorAll('.q-btn').forEach(b => b.disabled = true);
  if (!correct) {
    btn.classList.add('wrong');
    setTimeout(() => {
      btn.classList.remove('wrong');
      document.querySelectorAll('.q-btn').forEach(b => b.disabled = false);
    }, 700);
    return;
  }
  // Correct! Fade out question, reveal code
  const qBox = document.getElementById('q-box');
  qBox.style.transition = 'opacity 0.6s ease';
  qBox.style.opacity = '0';
  document.getElementById('figure-wrap').style.transition = 'opacity 0.6s ease';
  document.getElementById('figure-wrap').style.opacity = '0';

  setTimeout(() => {
    qBox.style.display = 'none';
    document.getElementById('figure-wrap').style.display = 'none';
    // Fetch code from server and reveal
    socket.emit('getInviteCode');
  }, 700);
}

socket.on('inviteCodeForPlayer', (code) => {
  const reveal = document.getElementById('code-reveal');
  document.getElementById('code-value').textContent = code;
  reveal.classList.add('show');
});

// ─── Continue to invite input ───
function goToInvite() {
  const dark = document.getElementById('s-dark');
  dark.classList.add('fade-out');
  setTimeout(() => {
    dark.style.display = 'none';
    const inv = document.getElementById('s-invite');
    inv.style.display = 'flex';
    inv.classList.add('fade-in');
    document.getElementById('invite-inp').focus();
  }, 500);
}

function goBack() {
  const inv = document.getElementById('s-invite');
  inv.classList.add('fade-out');
  setTimeout(() => {
    inv.style.display = 'none';
    inv.classList.remove('fade-out', 'fade-in');
    const dark = document.getElementById('s-dark');
    dark.style.display = 'flex';
    dark.style.opacity = '1';
    // Show question again
    const qBox = document.getElementById('q-box');
    qBox.style.display = '';
    qBox.style.opacity = '1';
    document.getElementById('figure-wrap').style.display = '';
    document.getElementById('figure-wrap').style.opacity = '1';
    document.getElementById('code-reveal').style.opacity = '0';
    document.querySelectorAll('.q-btn').forEach(b => b.disabled = false);
  }, 500);
}

// ─── STAGE 2: Check invite code ───
function checkInvite() {
  const val = document.getElementById('invite-inp').value.trim();
  if (!val) { setErr('أدخل الرمز أولاً'); return; }
  savedCode = val;
  socket.emit('checkInvite', val);
}

socket.on('inviteOk', () => goToLaptop());
socket.on('inviteFail', () => {
  setErr('الرمز غير صحيح ❌');
  document.getElementById('invite-inp').value = '';
  document.getElementById('invite-inp').focus();
});

function setErr(msg) {
  document.getElementById('invite-err').textContent = msg;
}

// ─── STAGE 3: Laptop TTY ───
function goToLaptop() {
  const inv = document.getElementById('s-invite');
  inv.classList.add('fade-out');
  setTimeout(() => {
    inv.style.display = 'none';
    const lap = document.getElementById('s-laptop');
    lap.style.display = 'flex';
    startTTY();
  }, 500);
}

const bootLines = [
  {t:'حروف مع حسن — نظام تسجيل اللاعبين',cls:'c-white',d:0},
  {t:'',d:80},
  {t:'[0.1] تهيئة الجلسة...',cls:'c-dim',d:260},
  {t:'[0.2] الاتصال بالسيرفر... ✓',cls:'c-dim',d:520},
  {t:'[0.3] تحميل شبكة الحروف... ✓',cls:'c-dim',d:780},
  {t:'[0.4] جاهز.',cls:'c-dim',d:1000},
  {t:'',d:1100},
  {t:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━',cls:'c-dim',d:1150},
  {t:'  أهلاً! سجّل بياناتك',cls:'c-yellow',d:1250},
  {t:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━',cls:'c-dim',d:1350},
  {t:'',d:1450},
];

function addLine(text, cls='') {
  const body = document.getElementById('tty-body');
  const div = document.createElement('div');
  div.className = 'tty-line' + (cls ? ' '+cls : '');
  div.textContent = text || '\u00a0';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  return div;
}

function startTTY() {
  bootLines.forEach(({t,cls,d}) => setTimeout(() => addLine(t,cls), d));
  setTimeout(showNamePrompt, 1600);
}

function showNamePrompt() {
  addLine('ما هو اسمك؟');
  const body = document.getElementById('tty-body');
  const row = document.createElement('div');
  row.className = 'inp-row';
  row.innerHTML = `<span class="tty-prompt">player@7oroof:~$</span><input class="tty-field" id="name-inp" maxlength="20" autocomplete="off"><span class="cur"></span>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
  const inp = document.getElementById('name-inp');
  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const v = inp.value.trim();
    if (!v) return;
    playerName = v;
    row.innerHTML = `<span class="tty-prompt">player@7oroof:~$</span> <span style="color:#fff">${v}</span>`;
    setTimeout(showTeamPrompt, 300);
  });
}

function showTeamPrompt() {
  const body = document.getElementById('tty-body');
  addLine('');
  addLine(`أهلاً ${playerName}! اختر فريقك:`);
  addLine('');
  const wrap = document.createElement('div');
  wrap.className = 'team-btns';
  wrap.innerHTML = `
    <button class="tbtn g" onclick="pickTeam('green',this)">🟢 الأخضر</button>
    <button class="tbtn o" onclick="pickTeam('orange',this)">🟠 البرتقالي</button>
  `;
  body.appendChild(wrap);
  body.scrollTop = body.scrollHeight;
}

function pickTeam(team, btn) {
  playerTeam = team;
  document.querySelectorAll('.tbtn').forEach(b => b.disabled = true);
  btn.classList.add(team === 'green' ? 'sg' : 'so');
  addLine('');
  addLine('> اخترت: ' + (team === 'green' ? 'الفريق الأخضر 🟢' : 'الفريق البرتقالي 🟠'));
  setTimeout(() => {
    addLine('> جاري الانضمام...');
    socket.emit('playerJoin', { name: playerName, team, inviteCode: savedCode });
  }, 600);
}

socket.on('joinOk', () => {
  addLine('');
  addLine('> ✅ تم الانضمام بنجاح!', 'c-yellow');
  addLine('> ⏳ في انتظار الهوست يبدأ اللعبة...', 'c-dim');
});

socket.on('joinFail', msg => {
  addLine('');
  addLine('> ❌ ' + msg);
  setTimeout(() => {
    document.querySelectorAll('.tbtn').forEach(b => { b.disabled = false; b.classList.remove('sg','so'); });
  }, 800);
});

socket.on('gameState', (state) => {
  if (state.phase === 'playing' && playerTeam) {
    window.location.href = '/game.html';
  }
});
</script>
</body>
</html>
