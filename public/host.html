<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حروف مع حسن - الهوست</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #22c55e;
  --orange: #f97316;
  --yellow: #facc15;
  --bg: #06080d;
  --surface: #0a0e14;
  --surface2: #0d1117;
  --surface3: #111820;
  --border: #1a2333;
  --text: #e2e8f0;
  --muted: #4b5563;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HOST LOGIN ===== */
#host-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.host-login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 340px;
  text-align: center;
}

.host-title {
  font-size: 1.6rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--green), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.host-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  outline: none;
  text-align: center;
  letter-spacing: 3px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--yellow); }

.btn { border: none; border-radius: 8px; font-family: 'Tajawal', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn-host-login {
  width: 100%;
  padding: 13px;
  font-size: 1rem;
  background: linear-gradient(135deg, var(--yellow), #f59e0b);
  color: #000;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(250,204,21,0.3);
}
.btn-host-login:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(250,204,21,0.4); }

#host-error { color: #ef4444; font-size: 0.9rem; margin-top: 10px; min-height: 20px; }

/* ===== HOST DASHBOARD ===== */
#host-dashboard {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}

/* TOP BAR */
.host-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.host-topbar-title {
  font-size: 1.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--green), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wins-display {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 0.9rem;
}
.win-count { font-weight: 900; }
.win-count.green { color: var(--green); }
.win-count.orange { color: var(--orange); }

.topbar-controls { display: flex; gap: 8px; flex-wrap: wrap; }

/* Buttons */
.btn-sm {
  padding: 7px 14px;
  font-size: 0.85rem;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface3);
  color: var(--text);
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-weight: 700;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--muted); background: var(--surface2); }
.btn-sm.green { border-color: var(--green); color: var(--green); }
.btn-sm.green:hover { background: rgba(34,197,94,0.1); }
.btn-sm.orange { border-color: var(--orange); color: var(--orange); }
.btn-sm.orange:hover { background: rgba(249,115,22,0.1); }
.btn-sm.yellow { border-color: var(--yellow); color: var(--yellow); }
.btn-sm.yellow:hover { background: rgba(250,204,21,0.1); }
.btn-sm.red { border-color: #ef4444; color: #ef4444; }
.btn-sm.red:hover { background: rgba(239,68,68,0.1); }
.btn-sm.primary { background: var(--green); color: #000; border-color: var(--green); }
.btn-sm.primary:hover { background: #16a34a; }

/* MAIN LAYOUT */
.host-main {
  display: grid;
  grid-template-columns: 260px 1fr 260px;
  gap: 14px;
  padding: 14px;
  flex: 1;
}

/* SIDEBAR */
.host-sidebar {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}

.panel-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

/* Team name edit */
.team-name-edit {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.team-name-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.team-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.team-name-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  outline: none;
  letter-spacing: 0;
  text-align: right;
}
.team-name-input:focus { border-color: var(--yellow); }

/* Grid size selector */
.grid-size-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.size-btn {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface3);
  color: var(--muted);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
}
.size-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(250,204,21,0.08); }
.size-btn:hover { border-color: var(--muted); }

/* Players list */
.host-player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.host-player-row:last-child { border-bottom: none; }

.player-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.host-player-name { flex: 1; font-size: 0.9rem; }
.host-player-score { font-size: 0.8rem; color: var(--muted); }

.icon-btn {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface3);
  color: var(--muted);
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: #ef4444; color: #ef4444; }
.icon-btn.active { background: rgba(239,68,68,0.2); color: #ef4444; border-color: #ef4444; }

/* CENTER */
.host-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.grid-container-host {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
}

/* Judge panel */
.judge-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.judge-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.judge-label { font-size: 0.8rem; color: var(--muted); }
.judge-player { font-size: 1.2rem; font-weight: 900; }

.judge-btns { display: flex; gap: 10px; }

.judge-btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.15s;
}
.judge-btn.correct {
  background: var(--green);
  color: #fff;
  box-shadow: 0 4px 16px rgba(34,197,94,0.4);
}
.judge-btn.correct:hover { background: #16a34a; transform: translateY(-1px); }
.judge-btn.wrong {
  background: #ef4444;
  color: #fff;
  box-shadow: 0 4px 16px rgba(239,68,68,0.4);
}
.judge-btn.wrong:hover { background: #dc2626; transform: translateY(-1px); }
.judge-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Current cell display */
.selected-cell-display {
  background: rgba(250,204,21,0.08);
  border: 1px solid rgba(250,204,21,0.3);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--yellow);
  text-align: center;
  min-width: 80px;
}

/* WIN OVERLAY */
#host-win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 2000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#host-win-overlay.active { display: flex; }
.win-emoji-big { font-size: 5rem; animation: bounce 0.5s ease infinite alternate; }
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
</style>
</head>
<body>

<!-- HOST LOGIN -->
<div id="host-login">
  <div class="host-login-card">
    <div class="host-title">🎙️ لوحة الهوست</div>
    <div class="host-subtitle">حروف مع حسن</div>
    <input type="password" id="host-code-input" placeholder="أدخل الكود السري" onkeydown="if(event.key==='Enter')hostLogin()">
    <button class="btn btn-host-login" onclick="hostLogin()">دخول كهوست</button>
    <div id="host-error"></div>
  </div>
</div>

<!-- HOST DASHBOARD -->
<div id="host-dashboard">
  <!-- Top Bar -->
  <div class="host-topbar">
    <div class="host-topbar-title">🎙️ حروف مع حسن — الهوست</div>

    <div class="wins-display">
      <span class="win-count green" id="wins-green">🟢 0</span>
      <span style="color:var(--muted)">انتصارات</span>
      <span class="win-count orange" id="wins-orange">🟠 0</span>
    </div>

    <div class="topbar-controls">
      <button class="btn-sm" onclick="emit('newGrid')">🔄 شبكة جديدة</button>
      <button class="btn-sm" onclick="emit('startGame')">▶️ بدء اللعبة</button>
      <button class="btn-sm primary" onclick="emit('newRound')">🎯 جولة جديدة</button>
      <button class="btn-sm" onclick="emit('restartGame')">♻️ إعادة تشغيل</button>
    </div>
  </div>

  <!-- Main -->
  <div class="host-main">

    <!-- Left Sidebar: Settings -->
    <div class="host-sidebar">

      <!-- Invite Code -->
      <div class="panel">
        <div class="panel-title">رمز الدعوة</div>
        <div style="display:flex;gap:6px">
          <input type="text" class="team-name-input" id="invite-code-input" placeholder="رمز الدعوة" style="letter-spacing:3px;text-align:center">
          <button class="btn-sm primary" onclick="updateInviteCode()">حفظ</button>
        </div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:6px" id="invite-code-display"></div>
      </div>

      <!-- Team Names -->
      <div class="panel">
        <div class="panel-title">أسماء الفريقين</div>
        <div class="team-name-edit">
          <div class="team-name-row">
            <div class="team-dot" style="background:var(--green)"></div>
            <input type="text" class="team-name-input" id="green-name-input" placeholder="الفريق الأخضر" oninput="updateTeamName('green',this.value)">
          </div>
          <div class="team-name-row">
            <div class="team-dot" style="background:var(--orange)"></div>
            <input type="text" class="team-name-input" id="orange-name-input" placeholder="الفريق البرتقالي" oninput="updateTeamName('orange',this.value)">
          </div>
        </div>
      </div>

      <!-- Grid Size -->
      <div class="panel">
        <div class="panel-title">حجم الشبكة</div>
        <div class="grid-size-btns">
          <button class="size-btn" onclick="setSize(4)">4×4</button>
          <button class="size-btn active" onclick="setSize(5)">5×5</button>
          <button class="size-btn" onclick="setSize(6)">6×6</button>
          <button class="size-btn" onclick="setSize(7)">7×7</button>
        </div>
      </div>

      <!-- Timeout controls -->
      <div class="panel">
        <div class="panel-title">تايم أوت يدوي</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          <button class="btn-sm green" onclick="manualTimeout('green')">⏱️ تايم أوت الأخضر</button>
          <button class="btn-sm orange" onclick="manualTimeout('orange')">⏱️ تايم أوت البرتقالي</button>
          <button class="btn-sm" onclick="manualTimeout('all')">⏱️ تايم أوت الكل</button>
        </div>
      </div>

      <!-- Hint button -->
      <div class="panel">
        <div class="panel-title">التلميح</div>
        <button class="btn-sm yellow" style="width:100%" onclick="emit('openButtonAfterHint')">🔓 فتح الزر بعد التلميح</button>
      </div>

    </div>

    <!-- Center: Grid + Judge -->
    <div class="host-center">

      <!-- Selected cell -->
      <div style="display:flex;align-items:center;gap:12px">
        <div class="selected-cell-display" id="host-selected-cell">—</div>
        <div style="color:var(--muted);font-size:0.85rem">اضغط على خلية في الشبكة لتحديدها</div>
      </div>

      <!-- Grid -->
      <div class="grid-container-host" id="host-hex-grid"></div>

      <!-- Judge panel -->
      <div class="judge-panel" id="judge-panel">
        <div class="judge-info">
          <div class="judge-label">اللاعب الضاغط:</div>
          <div class="judge-player" id="judge-player-name">—</div>
          <div class="judge-label" id="judge-team-label"></div>
        </div>
        <div class="judge-btns">
          <button class="judge-btn correct" id="btn-correct" onclick="judge(true)" disabled>✅ صح</button>
          <button class="judge-btn wrong" id="btn-wrong" onclick="judge(false)" disabled>❌ غلط</button>
        </div>
      </div>
    </div>

    <!-- Right Sidebar: Players -->
    <div class="host-sidebar">

      <!-- Players -->
      <div class="panel">
        <div class="panel-title" style="color:var(--green)">🟢 اللاعبون الخضر</div>
        <div id="host-green-players"></div>
      </div>

      <div class="panel">
        <div class="panel-title" style="color:var(--orange)">🟠 اللاعبون البرتقاليون</div>
        <div id="host-orange-players"></div>
      </div>

      <!-- Leaderboard -->
      <div class="panel">
        <div class="panel-title">🏆 المتصدرون</div>
        <div id="host-leaderboard"></div>
      </div>

    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="host-win-overlay">
  <div class="win-emoji-big">🎊</div>
  <div style="font-size:2.5rem;font-weight:900" id="host-win-team"></div>
  <div style="color:var(--muted)">فاز بالجولة!</div>
  <button class="btn-sm primary" onclick="emit('newRound');document.getElementById('host-win-overlay').classList.remove('active')">جولة جديدة</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
<script>
const socket = io();
let gameState = null;
let currentSize = 5;

// WebRTC for host mic
let localStream = null;
const peers = {};

async function initHostMic() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) { console.warn('Host mic failed:', e); }
}

function emit(event, data) {
  socket.emit(event, data);
}

function hostLogin() {
  const code = document.getElementById('host-code-input').value.trim();
  socket.emit('hostLogin', code);
}

socket.on('hostOk', async () => {
  document.getElementById('host-login').style.display = 'none';
  document.getElementById('host-dashboard').style.display = 'flex';
  await initHostMic();
});

socket.on('hostFail', () => {
  document.getElementById('host-error').textContent = 'الكود غير صحيح';
});

socket.on('gameState', (state) => {
  gameState = state;
  renderHostDashboard(state);
});

socket.on('roundWin', (winner) => {
  AudioEngine.playWin();
  const ov = document.getElementById('host-win-overlay');
  ov.classList.add('active');
  const el = document.getElementById('host-win-team');
  el.textContent = gameState?.teamNames[winner] || winner;
  el.style.color = winner === 'green' ? 'var(--green)' : 'var(--orange)';
});

socket.on('hintApproved', () => {
  AudioEngine.playHint();
});

function updateInviteCode() {
  const val = document.getElementById('invite-code-input').value.trim();
  if (!val) return;
  socket.emit('setInviteCode', val);
}

function renderHostDashboard(state) {
  // Invite code display
  const invDisp = document.getElementById('invite-code-display');
  if (invDisp) invDisp.textContent = `الرمز الحالي: ${state.inviteCode}`;
  const invInp = document.getElementById('invite-code-input');
  if (invInp && document.activeElement !== invInp) invInp.value = state.inviteCode;
  // Wins
  document.getElementById('wins-green').textContent = `🟢 ${state.wins.green}`;
  document.getElementById('wins-orange').textContent = `🟠 ${state.wins.orange}`;

  // Team name inputs
  const gi = document.getElementById('green-name-input');
  const oi = document.getElementById('orange-name-input');
  if (gi && document.activeElement !== gi) gi.value = state.teamNames.green;
  if (oi && document.activeElement !== oi) oi.value = state.teamNames.orange;

  // Grid size buttons
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  const sizeMap = {4:0,5:1,6:2,7:3};
  const btns = document.querySelectorAll('.size-btn');
  if (btns[sizeMap[state.gridSize]]) btns[sizeMap[state.gridSize]].classList.add('active');

  // Selected cell
  const sc = state.selectedCell;
  if (sc && state.grid[sc.row] && state.grid[sc.row][sc.col]) {
    document.getElementById('host-selected-cell').textContent = state.grid[sc.row][sc.col].letter || '—';
  } else {
    document.getElementById('host-selected-cell').textContent = '—';
  }

  // Grid - host can click cells
  buildHexGrid(state.grid, document.getElementById('host-hex-grid'), 48,
    (r, c) => {
      if (!state.grid[r][c].owner) {
        socket.emit('selectCell', { row: r, col: c });
      }
    }, true, null, state);

  // Judge panel
  const pressedId = state.buttonPressedBy;
  const btnCorrect = document.getElementById('btn-correct');
  const btnWrong = document.getElementById('btn-wrong');
  if (pressedId && state.players[pressedId]) {
    const p = state.players[pressedId];
    document.getElementById('judge-player-name').textContent = p.name;
    document.getElementById('judge-team-label').textContent = p.team === 'green' ? state.teamNames.green : state.teamNames.orange;
    document.getElementById('judge-player-name').style.color = p.team === 'green' ? 'var(--green)' : 'var(--orange)';
    btnCorrect.disabled = false;
    btnWrong.disabled = false;
  } else {
    document.getElementById('judge-player-name').textContent = '—';
    document.getElementById('judge-team-label').textContent = '';
    btnCorrect.disabled = true;
    btnWrong.disabled = true;
  }

  // Players
  renderHostTeam('green', state);
  renderHostTeam('orange', state);

  // Leaderboard
  document.getElementById('host-leaderboard').innerHTML = buildLeaderboard(state.players, state.teamNames);
}

function renderHostTeam(team, state) {
  const el = document.getElementById('host-' + team + '-players');
  const teamPlayers = Object.entries(state.players).filter(([,p]) => p.team === team);
  if (teamPlayers.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:8px">لا يوجد لاعبون</div>`;
    return;
  }
  el.innerHTML = teamPlayers.map(([id, p]) => `
    <div class="host-player-row">
      <div class="player-dot" style="background:${team === 'green' ? 'var(--green)' : 'var(--orange)'}"></div>
      <div class="host-player-name">${p.name}</div>
      <div class="host-player-score">${p.score}نقاط</div>
      <button class="icon-btn${p.muted ? ' active' : ''}" title="ميوت" onclick="hostMute('${id}', ${!p.muted})">🔇</button>
      <button class="icon-btn${p.deafened ? ' active' : ''}" title="ديفين" onclick="hostDeafen('${id}', ${!p.deafened})">🙉</button>
    </div>
  `).join('');
}

function updateTeamName(team, name) {
  socket.emit('setTeamName', { team, name });
}

function setSize(size) {
  currentSize = size;
  socket.emit('setGridSize', size);
}

function judge(correct) {
  AudioEngine.resume();
  if (correct) AudioEngine.playCorrect();
  else AudioEngine.playWrong();
  socket.emit('judge', correct);
}

function manualTimeout(team) {
  socket.emit('hostTimeout', { team });
}

function hostMute(playerId, muted) {
  socket.emit('hostMutePlayer', { playerId, muted });
}

function hostDeafen(playerId, deafened) {
  socket.emit('hostDeafenPlayer', { playerId, deafened });
}

// WebRTC for host
socket.on('webrtc-offer', async ({ from, offer }) => {
  if (!localStream) return;
  const pc = createHostPeer(from);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('webrtc-answer', { to: from, answer });
});
socket.on('webrtc-answer', async ({ from, answer }) => {
  await peers[from]?.setRemoteDescription(answer);
});
socket.on('webrtc-ice', ({ from, candidate }) => {
  peers[from]?.addIceCandidate(candidate);
});

function createHostPeer(id) {
  if (peers[id]) peers[id].close();
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[id] = pc;
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => { if (e.candidate) socket.emit('webrtc-ice', { to: id, candidate: e.candidate }); };
  pc.ontrack = e => {
    let audio = document.getElementById('haudio-' + id);
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'haudio-' + id;
      audio.autoplay = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = e.streams[0];
  };
  return pc;
}

async function connectToPlayers() {
  if (!gameState || !localStream) return;
  for (const [id] of Object.entries(gameState.players)) {
    if (!peers[id]) {
      const pc = createHostPeer(id);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('webrtc-offer', { to: id, offer });
    }
  }
}

socket.on('gameState', () => setTimeout(connectToPlayers, 500));

// Enter key login
document.getElementById('host-code-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') hostLogin();
});
</script>
