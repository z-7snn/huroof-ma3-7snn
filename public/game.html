<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حروف مع حسن</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-light:#dcfce7;--green-mid:#86efac;--green-dark:#14532d;
  --orange:#ea580c;--orange-light:#ffedd5;--orange-mid:#fdba74;--orange-dark:#7c2d12;
  --yellow:#d97706;--yellow-light:#fef3c7;
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;--muted2:#94a3b8;
  --red:#dc2626;--red-light:#fee2e2;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;}

/* ── TOP BAR ── */
.topbar{
  background:var(--surface);border-bottom:1.5px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);position:sticky;top:0;z-index:100;flex-wrap:wrap;
}
.topbar-title{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.topbar-question{font-size:.88rem;font-weight:700;color:var(--text);flex:1;text-align:center;}
.topbar-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.badge{padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;}

/* ── TIMER BAR ── */
.q-timer-bar{height:4px;background:var(--border);}
.q-timer-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));transition:width .5s linear;width:100%;}

/* ── LOBBY ── */
#lobby-wait{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#lobby-wait.active{display:flex;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MAIN LAYOUT: 3 columns ── */
/* LEFT: leaderboard | CENTER: grid+button | RIGHT: player buttons */
.game-wrap{
  display:grid;
  grid-template-columns:180px 1fr 220px;
  gap:12px;padding:12px;
  min-height:calc(100vh - 60px);
  align-items:start;
}

/* ── LEADERBOARD PANEL (left) ── */
.lb-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow);}
.panel-title{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.lb-entry{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.lb-entry:last-child{border-bottom:none;}
.lb-medal{width:20px;text-align:center;}
.lb-name{flex:1;font-weight:700;}
.lb-net{font-weight:900;font-size:.88rem;}

/* Timeout bars in lb panel */
.timeout-row{margin-top:8px;}
.timeout-label{font-size:.7rem;color:var(--muted);margin-bottom:3px;}
.t-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:none;}
.t-bar-bg.active{display:block;}
.t-bar-fill{height:100%;border-radius:3px;transition:width .1s linear;}
.t-bar-fill.green{background:var(--green);}
.t-bar-fill.orange{background:var(--orange);}

/* Vote buttons */
.vote-btn{width:100%;padding:7px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px dashed;display:none;margin-top:6px;}
.vote-btn.hint{border-color:var(--yellow);background:var(--yellow-light);color:var(--yellow);}
.vote-btn.cancel{border-color:var(--red);background:var(--red-light);color:var(--red);}
.vote-btn.active{display:block;}
.vote-btn.voted{opacity:.5;cursor:default;}

/* ── CENTER ── */
.game-center{display:flex;flex-direction:column;align-items:center;gap:14px;}
.hex-wrap{display:flex;align-items:center;justify-content:center;width:100%;}

/* MY BIG BUTTON */
.my-btn-section{display:flex;flex-direction:column;align-items:center;gap:6px;}
.answer-cd{font-size:3rem;font-weight:900;min-height:56px;display:flex;align-items:center;justify-content:center;line-height:1;}
.my-big-btn{
  width:130px;height:130px;border-radius:50%;border:none;
  font-family:'Tajawal',sans-serif;font-size:1.4rem;font-weight:900;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.my-big-btn.green{background:radial-gradient(circle at 38% 35%,#4ade80,var(--green));color:#fff;box-shadow:0 8px 0 var(--green-dark),0 10px 24px rgba(22,163,74,.35);}
.my-big-btn.green:active,.my-big-btn.green.pressed{box-shadow:0 3px 0 var(--green-dark),0 4px 12px rgba(22,163,74,.2);transform:translateY(5px);}
.my-big-btn.orange{background:radial-gradient(circle at 38% 35%,#fb923c,var(--orange));color:#fff;box-shadow:0 8px 0 var(--orange-dark),0 10px 24px rgba(234,88,12,.35);}
.my-big-btn.orange:active,.my-big-btn.orange.pressed{box-shadow:0 3px 0 var(--orange-dark),0 4px 12px rgba(234,88,12,.2);transform:translateY(5px);}
.my-big-btn.locked{background:#e2e8f0;color:var(--muted2);box-shadow:0 6px 0 #cbd5e1;cursor:not-allowed;}
.my-big-btn.timeout-st{background:#fee2e2;color:var(--red);box-shadow:0 6px 0 #fecaca;cursor:not-allowed;}
.my-big-btn.flash-g{animation:flashG .35s ease infinite alternate;}
.my-big-btn.flash-o{animation:flashO .35s ease infinite alternate;}
@keyframes flashG{from{box-shadow:0 8px 0 var(--green-dark),0 0 20px rgba(22,163,74,.5)}to{box-shadow:0 8px 0 var(--green-dark),0 0 50px rgba(22,163,74,.9)}}
@keyframes flashO{from{box-shadow:0 8px 0 var(--orange-dark),0 0 20px rgba(234,88,12,.5)}to{box-shadow:0 8px 0 var(--orange-dark),0 0 50px rgba(234,88,12,.9)}}
.my-btn-label{font-size:.8rem;color:var(--muted);text-align:center;}

/* ── RIGHT: PLAYERS PANEL ── */
.players-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;}

.team-section{display:flex;flex-direction:column;gap:6px;}
.team-label{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:2px;}
.team-label.green{background:var(--green-light);color:var(--green-dark);}
.team-label.orange{background:var(--orange-light);color:var(--orange-dark);}

/* Player button row */
.player-btn-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--surface2);
  transition:all .2s;
}
.player-btn-row.me{border-style:dashed;}
.player-btn-row.pressed-green{border-color:var(--green);background:var(--green-light);}
.player-btn-row.pressed-orange{border-color:var(--orange);background:var(--orange-light);}
.player-btn-row.timeout{border-color:var(--red);background:var(--red-light);}

/* The actual button circle per player */
.p-circle{
  width:44px;height:44px;border-radius:50%;border:none;
  font-size:.85rem;font-weight:900;cursor:default;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.p-circle.green-idle{background:var(--green-light);color:var(--green);border:2px solid var(--green-mid);}
.p-circle.orange-idle{background:var(--orange-light);color:var(--orange);border:2px solid var(--orange-mid);}
.p-circle.pressed-g{background:var(--green);color:#fff;border:2px solid var(--green-dark);animation:pulseG .4s infinite alternate;}
.p-circle.pressed-o{background:var(--orange);color:#fff;border:2px solid var(--orange-dark);animation:pulseO .4s infinite alternate;}
.p-circle.timeout{background:var(--red-light);color:var(--red);border:2px solid var(--red);}
.p-circle.locked{background:#f1f5f9;color:var(--muted2);border:2px solid var(--border);}
@keyframes pulseG{from{box-shadow:0 0 0 0 rgba(22,163,74,.4)}to{box-shadow:0 0 0 8px rgba(22,163,74,0)}}
@keyframes pulseO{from{box-shadow:0 0 0 0 rgba(234,88,12,.4)}to{box-shadow:0 0 0 8px rgba(234,88,12,0)}}

.p-info{display:flex;flex-direction:column;flex:1;min-width:0;}
.p-name{font-size:.85rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-stats{font-size:.7rem;display:flex;gap:4px;margin-top:1px;}
.p-correct{color:var(--green);font-weight:700;}
.p-wrong{color:var(--red);font-weight:700;}
.p-mic{font-size:.72rem;color:var(--muted2);}

/* Divider */
.team-divider{height:1px;background:var(--border);margin:4px 0;}

/* ── OVERLAYS ── */
#overlay{display:none;position:fixed;inset:0;z-index:1000;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(3px);}
#overlay.active{display:flex;}
.ov-name{font-size:2rem;font-weight:900;}
.ov-cd{font-size:9rem;font-weight:900;line-height:1;}
.ov-label{font-size:1rem;font-weight:700;color:var(--muted);}

#judgment-flash{display:none;position:fixed;inset:0;z-index:1500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#judgment-flash.active{display:flex;animation:jfIn .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes jfIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.jf-icon{font-size:9rem;line-height:1;filter:drop-shadow(0 4px 20px rgba(0,0,0,.15));}
.jf-text{font-size:3rem;font-weight:900;text-align:center;}

#win-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.97);z-index:2000;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#win-overlay.active{display:flex;}
.win-trophy{font-size:5rem;animation:wb .45s ease infinite alternate;}
@keyframes wb{from{transform:scale(1)}to{transform:scale(1.08)}}

@media(max-width:700px){
  .game-wrap{grid-template-columns:1fr;}
  .lb-panel{display:none;}
  .players-panel{display:none;}
}

/* LEVEL UP POPUP */
#levelup-popup{display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;}
#levelup-popup.show{display:block;animation:lvlPop .5s cubic-bezier(.34,1.6,.64,1);}
@keyframes lvlPop{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.6)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* TUTORIAL */
#tutorial-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(5,8,18,.88);backdrop-filter:blur(6px);align-items:center;justify-content:center;cursor:pointer;}
#tutorial-overlay.active{display:flex;}
.tut-card{background:#fff;border-radius:22px;padding:36px 40px;max-width:400px;width:92vw;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:tutIn .4s cubic-bezier(.34,1.4,.64,1);pointer-events:none;position:relative;}
@keyframes tutIn{from{opacity:0;transform:scale(.82) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tut-exit{animation:tutOut .3s ease forwards;}
@keyframes tutOut{from{opacity:1}to{opacity:0;transform:scale(.88) translateY(-20px)}}
.tut-icon{font-size:3.8rem;margin-bottom:12px;line-height:1;display:block;}
.tut-step{font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:8px;}
.tut-title{font-size:1.35rem;font-weight:900;color:#1e293b;margin-bottom:10px;}
.tut-body{font-size:.92rem;color:#475569;line-height:1.65;margin-bottom:18px;}
.tut-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:all .3s;}
.tut-dot.on{background:#16a34a;width:20px;}
.tut-hint{font-size:.75rem;color:#94a3b8;}
.tut-skip{position:absolute;top:14px;left:16px;font-size:.72rem;color:#94a3b8;pointer-events:all;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;}

/* WIN OVERLAY FIX */
#win-overlay.active{display:flex;}
#mvp-wrap{display:none;flex-direction:column;align-items:center;gap:4px;background:var(--yellow-light);border:2px solid #fcd34d;border-radius:16px;padding:16px 32px;text-align:center;}
#mvp-wrap.mvp-reveal{display:flex;animation:mvpIn .6s cubic-bezier(.34,1.7,.64,1);}
@keyframes mvpIn{from{opacity:0;transform:scale(.3) rotate(-12deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* XP POPUP */
#xp-popup{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);z-index:800;pointer-events:none;opacity:0;transition:transform .45s cubic-bezier(.34,1.5,.64,1),opacity .4s;min-width:270px;}
#xp-popup.show{transform:translateX(-50%) translateY(0);opacity:1;}
#xp-popup.hide{transform:translateX(-50%) translateY(60px);opacity:0;transition:transform .3s ease-in,opacity .3s ease-in;}
#xp-popup-inner{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:13px 18px;box-shadow:0 8px 28px rgba(0,0,0,.13);display:flex;flex-direction:column;gap:7px;}
#xp-popup-name{font-size:.95rem;font-weight:900;text-align:center;}
#xp-popup-mult{font-size:.75rem;font-weight:700;text-align:center;min-height:14px;}
#xp-bar-track{height:13px;background:#e2e8f0;border-radius:20px;overflow:hidden;position:relative;}
#xp-bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:20px;}
#xp-bar-fill-new{position:absolute;top:0;left:0;height:100%;border-radius:20px;opacity:.4;}
#xp-bar-labels{display:flex;justify-content:space-between;font-size:.66rem;font-weight:700;color:var(--muted);margin-top:3px;}
#xp-gain-label{font-size:.82rem;font-weight:900;text-align:center;}

</style>
</head>
<body>

<div id="lobby-wait" class="active">
  <div class="spinner"></div>
  <div id="lobby-msg" style="color:var(--muted);font-weight:700">⏳ جاري الاتصال...</div>
</div>

<div id="game-screen" style="display:none">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">حروف مع حسن <span style="font-size:.6rem;font-weight:400;-webkit-text-fill-color:var(--muted);color:var(--muted)">(النسخة الرسمية)</span></div>
    <div class="topbar-question" id="topbar-question">—</div>
    <div class="topbar-badges" id="topbar-badges">
      <span id="my-name-display" style="font-size:.8rem;font-weight:700;color:var(--muted);padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;"></span>
      <span id="my-prestige-badge" style="font-size:1.1rem"></span>
    </div>
  </div>
  <div class="q-timer-bar"><div class="q-timer-fill" id="q-timer-fill"></div></div>

  <div class="game-wrap">

    <!-- LEFT: LEADERBOARD -->
    <div class="lb-panel">
      <div class="panel-title">🏆 المتصدرون</div>
      <div id="leaderboard"></div>

      <div class="timeout-row">
        <div class="timeout-label">تايم أوت</div>
        <div class="t-bar-bg" id="green-t-wrap"><div class="t-bar-fill green" id="green-t-bar" style="width:100%"></div></div>
        <div style="height:4px"></div>
        <div class="t-bar-bg" id="orange-t-wrap"><div class="t-bar-fill orange" id="orange-t-bar" style="width:100%"></div></div>
      </div>

      <button class="vote-btn hint" id="hint-vote-btn" onclick="voteHint()">💡 تلميح</button>
      <button class="vote-btn cancel" id="cancel-vote-btn" onclick="voteCancelQ()">❌ إلغاء السؤال</button>
    </div>

    <!-- CENTER: GRID + MY BUTTON -->
    <div class="game-center">
      <div class="hex-wrap" id="hex-grid"></div>
      <div class="my-btn-section">
        <div class="answer-cd" id="answer-cd"></div>
        <button class="my-big-btn locked" id="my-btn" onclick="pressMyButton()">🔒</button>
        <div class="my-btn-label" id="my-btn-label">انتظر الهوست</div>
      </div>
    </div>

    <!-- RIGHT: PLAYERS BUTTONS -->
    <div class="players-panel">
      <div class="panel-title">اللاعبون</div>
      <div class="team-section">
        <span class="team-label green" id="green-label">🟢 الأخضر</span>
        <div id="green-players"></div>
      </div>
      <div class="team-divider"></div>
      <div class="team-section">
        <span class="team-label orange" id="orange-label">🟠 البرتقالي</span>
        <div id="orange-players"></div>
      </div>
    </div>

  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="ov-name" id="ov-name"></div>
  <div class="ov-label">عنده 5 ثوانٍ يجاوب!</div>
  <div class="ov-cd" id="ov-cd">5</div>
</div>

<!-- JUDGMENT FLASH -->
<div id="judgment-flash">
  <div class="jf-icon" id="jf-icon"></div>
  <div class="jf-text" id="jf-text"></div>
</div>

<!-- XP GAIN POPUP -->
<div id="xp-popup">
  <div id="xp-popup-inner">
    <div id="xp-popup-name"></div>
    <div id="xp-popup-mult"></div>
    <div id="xp-bar-track">
      <div id="xp-bar-fill"></div>
      <div id="xp-bar-fill-new"></div>
    </div>
    <div id="xp-bar-labels"><span id="xp-lv-current"></span><span id="xp-lv-next"></span></div>
    <div id="xp-gain-label"></div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-trophy">🏆</div>
  <div class="win-trophy" style="font-size:2.5rem;font-weight:900" id="win-name"></div>
  <div style="color:var(--muted);font-weight:700">فاز بالجولة! 🎉</div>
  <div id="mvp-wrap">
    <div style="font-size:2rem">⭐</div>
    <div style="font-size:.78rem;font-weight:700;color:var(--muted)">MVP الجولة</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
      <span id="mvp-team"></span>
      <span id="mvp-name" style="font-size:1.3rem;font-weight:900"></span>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
<script>
const socket = io({ reconnection:true, reconnectionDelay:1000, reconnectionAttempts:15 });
let myId=null, myTeam=null, myName=null, gameState=null;
let overlayTimer=null, answerCdTimer=null;
let hintVoted=false, cancelVoted=false;
let localStream=null;
const peers={};

async function initMic(){
  try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
  catch(e){ console.warn('Mic:',e); }
}

socket.on('connect',()=>{
  myId=socket.id; initMic();
  const name=sessionStorage.getItem('playerName');
  const team=sessionStorage.getItem('playerTeam');
  const code=sessionStorage.getItem('inviteCode');
  if(name&&team&&code){
    myName=name; myTeam=team;
    document.getElementById('lobby-msg').textContent=`⏳ مرحباً ${name}...`;
    const nameDisp=document.getElementById('my-name-display');
    if(nameDisp){ nameDisp.textContent=name; nameDisp.style.color=team==='green'?'var(--green)':'var(--orange)'; nameDisp.style.borderColor=team==='green'?'var(--green-mid,#86efac)':'var(--orange-mid,#fdba74)'; }
    socket.emit('playerJoin',{name,team,inviteCode:code});
  } else { window.location.href='/'; }
});

socket.on('joinFail',msg=>{ if(msg?.includes('رمز')){ sessionStorage.clear(); window.location.href='/'; }});
socket.on('gameState',state=>{ gameState=state; if(state.phase==='playing'&&!localStorage.getItem('tut_game_done')) setTimeout(startGameTutorial,800); if(!myTeam){myTeam=sessionStorage.getItem('playerTeam');myName=sessionStorage.getItem('playerName');} renderGame(state); setTimeout(startPeerConnections,500); });
socket.on('buttonPressed',({playerId,playerName,team})=>{ AudioEngine.playButtonPress(); showOverlay(playerId,playerName,team); });
socket.on('roundWin',winner=>{ AudioEngine.playWin(); showWinOverlay(winner); });
socket.on('hintApproved',()=>{ AudioEngine.playHint(); });
socket.on('questionExpired',()=>{ AudioEngine.playExpire(); showJudgmentFlash('⏰','انتهى وقت السؤال!','var(--red)','var(--red-light)'); });
socket.on('questionCancelled',()=>{ showJudgmentFlash('🚫','تم إلغاء السؤال','var(--red)','var(--red-light)'); });
socket.on('judgeResult',({correct, playerName})=>{
  if(overlayTimer){ clearInterval(overlayTimer); overlayTimer=null; }
  document.getElementById('overlay').classList.remove('active');
  if(correct){
    AudioEngine.playCorrect();
    showJudgmentFlash('✅','صــــح! 🎉', playerName, 'var(--green)','var(--green-light)');
  } else {
    AudioEngine.playWrong();
    showJudgmentFlash('❌','غلـــط! ❌', playerName, 'var(--red)','var(--red-light)');
  }
});

socket.on('xpGain', d => { setTimeout(()=>showXpPopup(d), 900); });

let _xpTimer=null;
function showXpPopup(d){
  const popup=document.getElementById('xp-popup');
  const color=d.team==='green'?'var(--green)':'var(--orange)';
  document.getElementById('xp-popup-name').textContent=d.playerName;
  document.getElementById('xp-popup-name').style.color=color;
  const mEl=document.getElementById('xp-popup-mult');
  mEl.textContent=d.multiplier===3?'🔥 تريبل XP ×3':d.multiplier===2?'⚡ دبل XP ×2':'';
  mEl.style.color=d.multiplier===3?'#d97706':'#6366f1';
  const fill=document.getElementById('xp-bar-fill'), fillN=document.getElementById('xp-bar-fill-new');
  fill.style.background=color; fillN.style.background=color;
  let pctB=0,pctA=0;
  if(d.newCorrect!==null&&d.answersPerLevel){
    const apl=d.answersPerLevel,lv=d.level||1;
    const inLv=d.newCorrect-(lv-1)*apl;
    pctA=Math.min(100,Math.round(inLv/apl*100));
    pctB=Math.max(0,pctA-Math.round(d.xpGained/apl*100));
    document.getElementById('xp-lv-current').textContent='Lv '+lv;
    document.getElementById('xp-lv-next').textContent='Lv '+(lv+1);
  } else {
    const sess=(gameState?.players[d.playerId]?.correctCount||1);
    pctA=Math.min(100,(sess%10)*10); pctB=Math.max(0,pctA-10);
    document.getElementById('xp-lv-current').textContent='';
    document.getElementById('xp-lv-next').textContent='';
  }
  fill.style.transition='none'; fillN.style.transition='none';
  fill.style.width=pctB+'%'; fillN.style.width=pctB+'%';
  document.getElementById('xp-gain-label').textContent='+'+d.xpGained+' XP';
  document.getElementById('xp-gain-label').style.color=color;
  popup.classList.remove('hide'); popup.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition='width .8s cubic-bezier(.22,1,.36,1)';
    fillN.style.transition='width 1.1s cubic-bezier(.22,1,.36,1)';
    fill.style.width=pctA+'%'; fillN.style.width=pctA+'%';
  }));
  if(_xpTimer) clearTimeout(_xpTimer);
  _xpTimer=setTimeout(()=>{ popup.classList.remove('show'); popup.classList.add('hide'); },3500);
}


// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderGame(state){
  const playing = state.phase==='playing'||state.phase==='roundEnd';
  if(state.phase==='playing') closeWinOverlay();
  document.getElementById('lobby-wait').classList.toggle('active',!playing);
  document.getElementById('game-screen').style.display = playing?'block':'none';
  if(!playing) return;

  // Team labels
  document.getElementById('green-label').textContent = '🟢 '+state.teamNames.green;
  document.getElementById('orange-label').textContent = '🟠 '+state.teamNames.orange;

  // ─ اللاعبون يشوفون التصنيف والصعوبة فقط ─
  const qd = state.currentQuestionData;
  const qEl = document.getElementById('topbar-question');
  if(state.currentQuestion){
    qEl.innerHTML = `<b style="color:var(--orange);font-size:1.3rem">${state.currentQuestion}</b>`;
  } else {
    qEl.textContent = '—';
  }

  // Badges: التصنيف والصعوبة فقط
  const badgesEl = document.getElementById('topbar-badges');
  if(qd && qd.category && qd.category !== '—'){
    const catColors = {'كروي':'#dbeafe;color:#1d4ed8','ديني':'#fef3c7;color:#92400e','علوم':'#dcfce7;color:#14532d','جغرافيا':'#f3e8ff;color:#6b21a8','علمي':'#e0f2fe;color:#0c4a6e','ثقافي':'#fce7f3;color:#9d174d'};
    const diffColors = {'سهل':'#dcfce7;color:#14532d','متوسط':'#fef3c7;color:#92400e','صعب':'#fee2e2;color:#dc2626'};
    const catStyle = catColors[qd.category] || '#f1f5f9;color:#475569';
    const diffStyle = diffColors[qd.difficulty] || '#f1f5f9;color:#475569';
    badgesEl.innerHTML = `<span class="badge" style="background:${catStyle}">${qd.category}</span><span class="badge" style="background:${diffStyle}">${qd.difficulty||''}</span>`;
  } else if(qd && qd.text === '⏳ جاري توليد السؤال...'){
    badgesEl.innerHTML = `<span class="badge" style="background:#f1f5f9;color:#64748b">⏳ جاري التحضير...</span>`;
  } else { badgesEl.innerHTML=''; }

  // Question timer
  const fill = document.getElementById('q-timer-fill');
  if(state.questionStartTime && state.phase==='playing'){
    const pct = Math.max(0, 100-(Date.now()-state.questionStartTime)/(5*60*1000)*100);
    fill.style.width = pct+'%';
  } else { fill.style.width='0%'; }

  // Grid
  buildHexGrid(state.grid, document.getElementById('hex-grid'), 44, null, true, myTeam, state);

  // Players panels
  renderPlayersPanel('green', state);
  renderPlayersPanel('orange', state);

  // Leaderboard
  renderLeaderboard(state);

  // My button
  renderMyButton(state);

  // Timeouts
  renderTimeouts(state);

  // Vote buttons
  renderVoteButtons(state);

  // Audio
  applyAudioState(state);
}

function renderPlayersPanel(team, state){
  const el = document.getElementById(team+'-players');
  const ps = Object.entries(state.players).filter(([,p])=>p.team===team);
  if(!ps.length){ el.innerHTML=`<div style="color:var(--muted2);font-size:.78rem;padding:6px">لا يوجد لاعبون</div>`; return; }
  const now = Date.now();
  el.innerHTML = ps.map(([id,p])=>{
    const isMe = id===myId;
    const isPressed = state.buttonPressedBy===id;
    const inTimeout = (team==='green'&&state.greenTimeoutUntil>now)||(team==='orange'&&state.orangeTimeoutUntil>now);
    const net = (p.correctCount||0)-(p.wrongCount||0);

    // Row class
    let rowClass = 'player-btn-row'+(isMe?' me':'');
    if(isPressed) rowClass += ' pressed-'+team;
    else if(inTimeout && (p.muted||p.deafened)) rowClass += ' timeout';

    // Circle class
    let circleClass = 'p-circle ';
    if(isPressed) circleClass += 'pressed-'+(team==='green'?'g':'o');
    else if(inTimeout && p.muted) circleClass += 'timeout';
    else if(!state.buttonOpen && !state.buttonPressedBy) circleClass += 'locked';
    else circleClass += team+'-idle';

    const circleContent = isPressed ? '⚡' : (inTimeout&&p.muted ? '⏱️' : p.name[0]);

    return `<div class="${rowClass}">
      <div class="${circleClass}">${circleContent}</div>
      <div class="p-info">
        <div class="p-name">${p.name}${isMe?' (أنت)':''}</div>
        <div class="p-stats">
          <span class="p-correct">✓${p.correctCount||0}</span>
          <span class="p-wrong">✗${p.wrongCount||0}</span>
          <span style="color:${net>=0?'var(--green)':'var(--red)'};font-weight:700">${net>=0?'+':''}${net}</span>
        </div>
      </div>
      <span class="p-mic">${p.muted?'🔇':'🎙️'}</span>
    </div>`;
  }).join('');
}

function renderLeaderboard(state){
  const el = document.getElementById('leaderboard');
  const medals = ['🥇','🥈','🥉'];
  const sorted = Object.entries(state.players)
    .map(([id,p])=>({id,...p,net:(p.correctCount||0)-(p.wrongCount||0)}))
    .sort((a,b)=>b.net-a.net).slice(0,3);
  if(!sorted.length){ el.innerHTML=`<div style="color:var(--muted2);font-size:.78rem">لا يوجد لاعبون</div>`; return; }
  el.innerHTML = sorted.map((p,i)=>`
    <div class="lb-entry">
      <span class="lb-medal">${medals[i]||''}</span>
      <span class="lb-name" style="color:${p.team==='green'?'var(--green)':'var(--orange)'}">${p.name}</span>
      <span class="lb-net" style="color:${p.net>=0?'var(--green)':'var(--red)'}">${p.net>=0?'+':''}${p.net}</span>
    </div>
  `).join('');
}

function renderMyButton(state){
  const btn = document.getElementById('my-btn');
  const label = document.getElementById('my-btn-label');
  const cd = document.getElementById('answer-cd');
  const pressed = state.buttonPressedBy;
  const now = Date.now();

  if(answerCdTimer && pressed!==myId){ clearInterval(answerCdTimer); answerCdTimer=null; }

  if(!state.currentQuestion){
    btn.className='my-big-btn locked'; btn.textContent='🔒';
    label.textContent='انتظر الهوست يختار حرف'; cd.textContent=''; return;
  }
  if(pressed===myId){
    btn.className=`my-big-btn ${myTeam} flash-${myTeam[0]} pressed`; btn.textContent='⚡';
    label.textContent='أنت ضغطت! جاوب الآن';
    if(!answerCdTimer && state.answerTimerEnd){
      let s = Math.ceil((state.answerTimerEnd-Date.now())/1000);
      cd.textContent=s>0?s:''; cd.style.color=s<=2?'var(--red)':'var(--green)';
      answerCdTimer=setInterval(()=>{
        s=Math.ceil((state.answerTimerEnd-Date.now())/1000);
        if(s<=0){ cd.textContent='⏰'; cd.style.color='var(--red)'; clearInterval(answerCdTimer); answerCdTimer=null; }
        else{ cd.textContent=s; cd.style.color=s<=2?'var(--red)':'var(--green)'; AudioEngine.playTick(); }
      },1000);
    }
    return;
  }
  if(pressed){
    btn.className='my-big-btn locked'; btn.textContent='👂';
    label.textContent=(gameState?.players[pressed]?.name||'شخص')+' يجاوب...';
    if(state.answerTimerEnd){ const s=Math.ceil((state.answerTimerEnd-now)/1000); cd.textContent=s>0?s:'⏰'; cd.style.color='var(--orange)'; }
    else cd.textContent='';
    return;
  }
  cd.textContent='';
  const inTimeout = myTeam==='green' ? state.greenTimeoutUntil>now : state.orangeTimeoutUntil>now;
  const myPlayer = state.players[myId];
  if(inTimeout||myPlayer?.muted){
    btn.className='my-big-btn timeout-st'; btn.textContent='⏱️';
    const remaining = ((myTeam==='green'?state.greenTimeoutUntil:state.orangeTimeoutUntil)-now)/1000;
    label.textContent=`تايم أوت — ${Math.ceil(Math.max(0,remaining))}ث`; return;
  }
  if(state.opponentWindowOpen && state.opponentTeam && myTeam!==state.opponentTeam){
    btn.className='my-big-btn locked'; btn.textContent='⌛';
    label.textContent='دور الفريق الثاني'; return;
  }
  if(!state.buttonOpen){
    btn.className='my-big-btn locked'; btn.textContent='🔒';
    label.textContent='الزر مغلق'; return;
  }
  btn.className=`my-big-btn ${myTeam}`;
  btn.textContent='اضغط';
  label.textContent=state.opponentWindowOpen?'⚡ دورك الآن!':'الزر مفتوح!';
}

function renderTimeouts(state){
  const now=Date.now();
  ['green','orange'].forEach(t=>{
    const until=state[t+'TimeoutUntil'];
    const wrap=document.getElementById(t+'-t-wrap');
    const bar=document.getElementById(t+'-t-bar');
    if(until>now){ wrap.classList.add('active'); bar.style.width=((until-now)/10000*100)+'%'; }
    else wrap.classList.remove('active');
  });
}

function renderVoteButtons(state){
  const hBtn=document.getElementById('hint-vote-btn');
  const cBtn=document.getElementById('cancel-vote-btn');
  if(state.hintActive&&!state.hintUnlocked){
    hBtn.classList.add('active');
    hBtn.textContent=state.hintVotes?.[myId]?'✅ صوّتت للتلميح':'💡 تلميح';
    hBtn.classList.toggle('voted',!!(state.hintVotes?.[myId]));
  } else hBtn.classList.remove('active');
  if(state.cancelVoteActive){
    cBtn.classList.add('active');
    cBtn.textContent=state.cancelVotes?.[myId]?'✅ صوّتت للإلغاء':'❌ إلغاء السؤال';
    cBtn.classList.toggle('voted',!!(state.cancelVotes?.[myId]));
  } else { cBtn.classList.remove('active'); cancelVoted=false; }
}

function applyAudioState(state){
  const me=state.players[myId]; if(!me||!localStream) return;
  localStream.getAudioTracks().forEach(t=>{t.enabled=!me.muted;});
  Object.entries(peers).forEach(([id])=>{ const a=document.getElementById('audio-'+id); if(a) a.muted=!!me.deafened; });
}

// ─── WEBRTC ───────────────────────────────────────────────────────────────────
socket.on('webrtc-offer',async({from,offer})=>{ if(!localStream)return; const pc=createPeer(from); await pc.setRemoteDescription(offer); const ans=await pc.createAnswer(); await pc.setLocalDescription(ans); socket.emit('webrtc-answer',{to:from,answer:ans}); });
socket.on('webrtc-answer',async({from,answer})=>{ await peers[from]?.setRemoteDescription(answer); });
socket.on('webrtc-ice',({from,candidate})=>{ peers[from]?.addIceCandidate(candidate); });
function createPeer(id){
  if(peers[id])peers[id].close();
  const pc=new RTCPeerConnection({iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
        {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
        {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
        {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}
      ]});
  peers[id]=pc;
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{if(e.candidate)socket.emit('webrtc-ice',{to:id,candidate:e.candidate});};
  pc.ontrack=e=>{let a=document.getElementById('audio-'+id);if(!a){a=document.createElement('audio');a.id='audio-'+id;a.autoplay=true;document.body.appendChild(a);}a.srcObject=e.streams[0];};
  return pc;
}
async function startPeerConnections(){
  if(!gameState||!localStream)return;
  for(const[id]of Object.entries(gameState.players)){
    if(id!==myId&&!peers[id]){const pc=createPeer(id);const o=await pc.createOffer();await pc.setLocalDescription(o);socket.emit('webrtc-offer',{to:id,offer:o});}
  }
}

  if(gameState){
    var top=Object.entries(gameState.players).map(function(e){ return Object.assign({},e[1],{net:(e[1].correctCount||0)-(e[1].wrongCount||0)}); }).sort(function(a,b){ return b.net-a.net; })[0];
    if(top){
      document.getElementById('mvp-name').textContent=top.name+' ('+top.net+'+)';
      var mt=document.getElementById('mvp-team'); if(mt) mt.textContent=top.team==='green'?'🟢':'🟠';

var _gTutSteps=[],_gTutIdx=0,_gTutKey='';
function showGameTutorial(steps,key){
  _gTutSteps=steps;_gTutIdx=0;_gTutKey=key;
  document.getElementById('tutorial-overlay').classList.add('active');
  renderGTutStep();
  document.getElementById('tutorial-overlay').onclick=nextGTutStep;
}
function renderGTutStep(){
  var s=_gTutSteps[_gTutIdx],total=_gTutSteps.length;
  document.getElementById('tut-card').innerHTML=
    '<span class="tut-skip" onclick="closeGTutorial(event)">تخطي ✕</span>'
    +'<span class="tut-icon">'+s.icon+'</span>'
    +'<div class="tut-step">'+(_gTutIdx+1)+' / '+total+'</div>'
    +'<div class="tut-title">'+s.title+'</div>'
    +'<div class="tut-body">'+s.body+'</div>'
    +'<div class="tut-dots">'+_gTutSteps.map(function(_,i){ return '<div class="tut-dot'+(i===_gTutIdx?' on':'')+'"></div>'; }).join('')+'</div>'
    +'<div class="tut-hint">'+(_gTutIdx===total-1?'اضغط للبدء ✅':'اضغط للخطوة التالية →')+'</div>';
  var c=document.getElementById('tut-card'); c.classList.remove('tut-exit'); void c.offsetWidth;
}
function nextGTutStep(e){
  if(e.target.classList.contains('tut-skip')) return;
  if(_gTutIdx>=_gTutSteps.length-1){ closeGTutorial(); return; }
  var c=document.getElementById('tut-card'); c.classList.add('tut-exit');
  setTimeout(function(){ _gTutIdx++; renderGTutStep(); },280);
}
function closeGTutorial(e){ if(e) e.stopPropagation(); localStorage.setItem(_gTutKey,'1'); document.getElementById('tutorial-overlay').classList.remove('active'); }

</script>

<!-- LEVEL UP POPUP -->
<div id="levelup-popup">
  <div id="levelup-card" style="background:linear-gradient(135deg,#fef3c7,#fff);border:2px solid #fcd34d;border-radius:18px;padding:16px 32px;text-align:center;box-shadow:0 8px 32px rgba(217,119,6,.35);min-width:180px;"></div>
</div>

<!-- TUTORIAL OVERLAY -->
<div id="tutorial-overlay">
  <div class="tut-card" id="tut-card"></div>
</div>

</body>
</html>
